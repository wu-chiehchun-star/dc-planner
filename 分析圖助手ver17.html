          penBaseStrokeWidthRef.current = null;
        }
        if (e.pointerType === 'touch') {
          pointersRef.current.delete(e.pointerId);
          if (gestureActive && pointersRef.current.size < 2) {
            setGestureActive(false);
          }
        }
        if(e && e.target && e.target.releasePointerCapture) {
           try { e.target.releasePointerCapture(e.pointerId); } catch(err){}
        }

        if(activeTool==='pan') { setIsDr(false); return; }
        if(isD&&activeTool==='zone') setDraftItems(p=>(p||items).map(i=>i.id===selectedIds[0]?{...i,startX:undefined,startY:undefined}:i));
        
        if(draftItems) {
          setItems(draftItems);
          setDraftItems(null);
        }
        
        if(isD||isDr||dH) if(commitHistory)commitHistory();
        setIsD(false); setIsDr(false); setDH(null); setSB(null); setSG({x:null,y:null});
      };

      const onCtx = e => {
        if (!selectedIds.length) return;
        e.preventDefault();
        setCm({x: e.clientX, y: e.clientY});
      };
      const cUpd = () => { if(commitHistory) commitHistory(); };
      const btf = () => { setItems(p=>[...p.filter(i=>!selectedIds.includes(i.id)), ...p.filter(i=>selectedIds.includes(i.id))]); cUpd(); setCm(null); };
      const stb = () => { setItems(p=>[...p.filter(i=>selectedIds.includes(i.id)), ...p.filter(i=>!selectedIds.includes(i.id))]); cUpd(); setCm(null); };
      const del = () => { setItems(p=>p.filter(i=>!selectedIds.includes(i.id))); setSelectedIds([]); cUpd(); setCm(null); };
      const openNewFile = () => {
        setItems([]);
        setSelectedIds([]);
        setClipboard([]);
        setActiveTool('select');
        setActiveColor(COLORS[6]);
        setBgImage(null);
        setSnapEnabled(true);
        setGridType('dots');
        setIsSketchMode(false);
        setLayers([{ id: 'layer-1', name: '圖層 1', visible: true, locked: false, faded: false, isFolder: false }]);
        setActiveLayerId('layer-1');
        setPan({ x: 0, y: 0 });
        setZoom(1);
        setMeasurePoints([]);
        setMeasureResults([]);
        setProjectLoaded(true);
        if (hm.current) {
          hm.current.hist = [[]];
          hm.current.idx = 0;
          hm.current.update();
        }
      };
      const dup = () => {
        const n = items.filter(i=>selectedIds.includes(i.id)).map(i=>{
          let res = structuredClone(i); res.id = Date.now() + Math.random();
          if(res.groupId) res.groupId += '-dup';
          if(res.x!==undefined) res.x+=20; if(res.y!==undefined) res.y+=20;
          if(res.cx!==undefined) res.cx+=20; if(res.cy!==undefined) res.cy+=20;
          if(res.x1!==undefined) { res.x1+=20; res.y1+=20; res.x2+=20; res.y2+=20; }
          if(res.points) res.points = res.points.map(p=>({x:p.x+20,y:p.y+20}));
          if(res.subPaths) res.subPaths = res.subPaths.map(pl=>pl.map(p=>({x:p.x+20,y:p.y+20})));
          return res;
        });
        setItems(p=>[...p, ...n]); setSelectedIds(n.map(i=>i.id)); cUpd(); setCm(null);
      };

      const copySelection = () => {
        if (selectedIds.length === 0) return;
        const copied = items.filter(i => selectedIds.includes(i.id)).map(i => JSON.parse(JSON.stringify(i)));
        setClipboard(copied);
      };

      const pasteClipboard = () => {
        if (clipboard.length === 0) return;
        const pasted = clipboard.map((item, index) => {
          const res = JSON.parse(JSON.stringify(item));
          res.id = Date.now() + Math.random() + index;
          if (res.x !== undefined) res.x += 20; if (res.y !== undefined) res.y += 20;
          if (res.cx !== undefined) res.cx += 20; if (res.cy !== undefined) res.cy += 20;
          if (res.x1 !== undefined) { res.x1 += 20; res.y1 += 20; res.x2 += 20; res.y2 += 20; }
          if (res.points) res.points = res.points.map(p => ({ x: p.x + 20, y: p.y + 20 }));
          if (res.subPaths) res.subPaths = res.subPaths.map(pl => pl.map(p => ({ x: p.x + 20, y: p.y + 20 })));
          return res;
        });
        setItems(p => [...p, ...pasted]);
        setSelectedIds(pasted.map(i => i.id));
        setTimeout(commitHistory, 0);
      };
      
      const createArray = () => {
        const cIn = prompt('列數 (水平數量，包含原本的):', '3');
        if(cIn === null) return setCm(null);
        const rIn = prompt('行數 (垂直數量，包含原本的):', '1');
        if(rIn === null) return setCm(null);
        const cols = parseInt(cIn) || 1, rows = parseInt(rIn) || 1;
        if(cols <= 1 && rows <= 1) return setCm(null);
        
        const gxIn = prompt('請輸入物件之間的 水平間距 (px):', '20');
        if(gxIn === null) return setCm(null);
        const gyIn = prompt('請輸入物件之間的 垂直間距 (px):', '20');
        if(gyIn === null) return setCm(null);
        const gapX = parseInt(gxIn) || 0, gapY = parseInt(gyIn) || 0;

        const targets = items.filter(i=>selectedIds.includes(i.id));
        let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
        targets.forEach(t => {
           const b = GeometryUtils.getBoundingBox(t);
           if(b.minX<minX) minX=b.minX; if(b.maxX>maxX) maxX=b.maxX;
           if(b.minY<minY) minY=b.minY; if(b.maxY>maxY) maxY=b.maxY;
        });
        const w = maxX - minX || 50, h = maxY - minY || 50;

        const nItems = [];
        for(let r=0; r<rows; r++){
          for(let c=0; c<cols; c++){
            if(r===0 && c===0) continue;
            const dx = c * (w + gapX);
            const dy = r * (h + gapY);
            const cloned = targets.map(i => {
              let res = structuredClone(i);
              res.id = Date.now() + Math.random();
              if(res.groupId) res.groupId += `-arr-${r}-${c}`;
              if(res.x!==undefined) res.x+=dx; if(res.y!==undefined) res.y+=dy;
              if(res.cx!==undefined) res.cx+=dx; if(res.cy!==undefined) res.cy+=dy;
              if(res.x1!==undefined) { res.x1+=dx; res.y1+=dy; res.x2+=dx; res.y2+=dy; }
              if(res.points) res.points = res.points.map(p=>({x:p.x+dx,y:p.y+dy}));
              if(res.subPaths) res.subPaths = res.subPaths.map(pl=>pl.map(p=>({x:p.x+dx,y:p.y+dy})));
              return res;
            });
            nItems.push(...cloned);
          }
        }
        setItems(p=>[...p, ...nItems]);
        setSelectedIds(p=>[...p, ...nItems.map(i=>i.id)]);
        cUpd(); setCm(null);
      };

      const createPathArray = () => {
        const pathTypes = ['arrow', 'dashed_arrow', 'road', 'solid_line', 'dashed_line', 'spline'];
        const selectedPath = items.find(i => selectedIds.includes(i.id) && pathTypes.includes(i.type));
        const selectedIcon = items.find(i => selectedIds.includes(i.id) && i.type === 'icon_element');
        if (!selectedPath || !selectedIcon) {
          return alert(t('pathArrayPromptSelect'));
        }
        if (!selectedPath.points || selectedPath.points.length < 2) {
          return alert(t('pathArrayInvalidPath'));
        }
        const countInput = prompt(t('pathArrayCountPrompt'), '8');
        if (countInput === null) return setCm(null);
        const count = parseInt(countInput, 10);
        if (!count || count < 1) return setCm(null);
        const samples = GeometryUtils.getEquidistantPoints(selectedPath.points, count);
        const clones = samples.map((pos, index) => {
          const res = structuredClone(selectedIcon);
          res.id = Date.now() + Math.random() + index;
          res.x = pos.x;
          res.y = pos.y;
          if (res.rotation !== undefined) res.rotation = pos.angle;
          if (res.layerId === undefined) res.layerId = selectedPath.layerId || selectedIcon.layerId;
          return res;
        });
        setItems(p => [...p, ...clones]);
        setSelectedIds(clones.map(i => i.id));
        cUpd(); setCm(null);
      };

      const canMergeLines = items.filter(i=>selectedIds.includes(i.id)&&['arrow', 'dashed_arrow', 'road'].includes(i.type)).length>1;
      const canMergeZones = items.filter(i=>selectedIds.includes(i.id)&&i.type==='zone').length>1;
      const canPathArray = selectedIds.some(id=>items.find(i=>i.id===id && ['arrow','dashed_arrow','road','solid_line','dashed_line','spline'].includes(i.type))) && selectedIds.some(id=>items.find(i=>i.id===id && i.type==='icon_element'));
      const canDistribute = selectedIds.length > 2;
      const canGroupLocal = selectedIds.length > 1;
      const canUngroupLocal = selectedIds.some(id => items.find(i=>i.id===id)?.groupId);

      const CMBtn = ({i:I, l, c, d}) => <button onClick={c} className={`flex items-center w-full px-3 py-1.5 text-xs hover:bg-gray-100 ${d?'text-red-600':'text-gray-700'}`}><I size={14} className="mr-2"/>{l}</button>;

      return (
        <div className="flex-1 relative overflow-hidden" style={{cursor: 'crosshair'}} onContextMenu={onCtx}>
          {cm && (
            <div className="fixed bg-white border border-gray-200 shadow-xl rounded-md py-1 z-50 w-40" style={{left:cm.x, top:cm.y}}>
              {selectedIds.length > 0 ? (
                <>
                  <CMBtn i={Lucide.Copy} l={t('copy')} c={dup} />
                  <CMBtn i={Lucide.LayoutGrid} l={t('arrayCopy')} c={createArray} />
                  {canPathArray && <CMBtn i={Lucide.Repeat} l={t('pathArray')} c={createPathArray} />}
                  <CMBtn i={Lucide.ArrowUpToLine} l={t('bringToFront')} c={btf} />
                  <CMBtn i={Lucide.ArrowDownToLine} l={t('sendToBack')} c={stb} />
                  {canGroupLocal && (
                    <>
                      <div className="w-full h-px bg-gray-100 my-1" />
                      <div className="px-3 py-0.5 text-[10px] font-bold text-gray-500">{t('alignTools')}</div>
                      <div className="grid grid-cols-3 gap-0.5 px-2 py-1">
                        <button onClick={()=>{handleAlign('left'); setCm(null);}} className="p-1 hover:bg-gray-100 rounded text-gray-600" title={t('alignLeft')}><Lucide.AlignLeft size={13}/></button>
                        <button onClick={()=>{handleAlign('center'); setCm(null);}} className="p-1 hover:bg-gray-100 rounded text-gray-600" title={t('alignCenter')}><Lucide.AlignCenter size={13}/></button>
                        <button onClick={()=>{handleAlign('right'); setCm(null);}} className="p-1 hover:bg-gray-100 rounded text-gray-600" title={t('alignRight')}><Lucide.AlignRight size={13}/></button>
                        <button onClick={()=>{handleAlign('top'); setCm(null);}} className="p-1 hover:bg-gray-100 rounded text-gray-600 col-span-1" title={t('alignTop')}><Lucide.ArrowUpToLine size={13}/></button>
                        <button onClick={()=>{handleAlign('bottom'); setCm(null);}} className="p-1 hover:bg-gray-100 rounded text-gray-600 col-span-1" title={t('alignBottom')}><Lucide.ArrowDownToLine size={13}/></button>
                      </div>
                      <CMBtn i={Lucide.Package} l={t('group')} c={()=>{handleGroup(); setCm(null);}} />
                    </>
                  )}
                  {canUngroupLocal && <CMBtn i={Lucide.PackageOpen} l={t('ungroup')} c={()=>{handleUngroup(); setCm(null);}} />}
                  {canDistribute && (
                    <>
                      <div className="w-full h-px bg-gray-100 my-1" />
                      <CMBtn i={Lucide.MoveHorizontal} l={t('moveHorizontal')} c={()=>{handleDistribute('h'); setCm(null);}} />
                      <CMBtn i={Lucide.MoveVertical} l={t('moveVertical')} c={()=>{handleDistribute('v'); setCm(null);}} />
                    </>
                  )}
                  {canMergeLines && (
                    <>
                      <div className="w-full h-px bg-gray-100 my-1" />
                      <CMBtn i={Lucide.Link} l={t('mergeLines')} c={()=>{handleMergeLines(); setCm(null);}} />
                    </>
                  )}
                  {canMergeZones && (
                    <>
                      <div className="w-full h-px bg-gray-100 my-1" />
                      <div className="px-3 py-0.5 text-[10px] font-bold text-gray-500">{t('zoneOperations')}</div>
                      <button onClick={()=>{handleZoneBoolean('union'); setCm(null);}} className="flex items-center w-full px-3 py-1.5 text-xs hover:bg-gray-100 text-gray-700"><svg width="13" height="13" viewBox="0 0 24 24" className="mr-2"><path d="M4 4 H15 V9 H20 V20 H9 V15 H4 Z" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" /></svg>{t('zoneUnion')}</button>
                      <button onClick={()=>{handleZoneBoolean('intersection'); setCm(null);}} className="flex items-center w-full px-3 py-1.5 text-xs hover:bg-gray-100 text-gray-700"><svg width="13" height="13" viewBox="0 0 24 24" className="mr-2"><rect x="4" y="4" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" /><rect x="9" y="9" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" /><rect x="9" y="9" width="6" height="6" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" /></svg>{t('zoneIntersection')}</button>
                      <button onClick={()=>{handleZoneBoolean('difference'); setCm(null);}} className="flex items-center w-full px-3 py-1.5 text-xs hover:bg-gray-100 text-gray-700"><svg width="13" height="13" viewBox="0 0 24 24" className="mr-2"><rect x="9" y="9" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" /><path d="M4 4 H15 V9 H9 V15 H4 Z" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" /></svg>{t('zoneDifference')}</button>
                    </>
                  )}
                  <div className="w-full h-px bg-gray-100 my-1" />
                  <CMBtn i={Lucide.Trash2} l={t('delete')} c={del} d />
                </>
              ) : <div className="px-3 py-2 text-gray-400 text-xs text-center">{t('noSelection')}</div>}
            </div>
          )}
          
          <svg id="main-canvas-svg" ref={svgRef} className="w-full h-full touch-none" style={{ touchAction: 'none' }} onPointerDown={onDn} onPointerMove={onMv} onPointerUp={onUp} onPointerCancel={onUp} onPointerLeave={() => { if (!isD && !isDr && !dH) setSG({x:null,y:null}); }}>
            <defs>
              <pattern id="bg-dots" width={gridSize} height={gridSize} patternUnits="userSpaceOnUse">
                <circle cx={gridSize/2} cy={gridSize/2} r="1.5" fill="#d1d5db"/>
              </pattern>
              <pattern id="bg-square" width={gridSize} height={gridSize} patternUnits="userSpaceOnUse">
                <path d={`M ${gridSize} 0 L 0 0 0 ${gridSize}`} fill="none" stroke="#e5e7eb" strokeWidth="1"/>
              </pattern>
              <pattern id="bg-iso" width={gridSize * 1.73205} height={gridSize} patternUnits="userSpaceOnUse">
                <path d={`M 0 ${gridSize/2} L ${gridSize * 0.866025} 0 L ${gridSize * 1.73205} ${gridSize/2} L ${gridSize * 0.866025} ${gridSize} Z M ${gridSize * 0.866025} 0 L ${gridSize * 0.866025} ${gridSize}`} fill="none" stroke="#e5e7eb" strokeWidth="0.5"/>
              </pattern>

              <filter id="sketch-filter" x="-20%" y="-20%" width="140%" height="140%">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" result="displaced" />
              </filter>

              {Array.from(new Set(items.flatMap(i=>((i.type==='zone'||i.type==='triangle_marker'||i.type==='circle_zone'||(i.type==='highlight'&&i.iconType==='solid'))&&i.fillPattern&&i.fillPattern!=='solid')?`${i.fillPattern}|${i.color}`:[]))).map(c=>{
                const [pt,cl] = c.split('|'), id=`pat-${pt}-${cl.replace('#','')}`;
                if(pt==='stripe-diagonal') return <pattern key={id} id={id} width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke={cl} strokeWidth="3"/></pattern>;
                if(pt==='crosshatch') return <pattern key={id} id={id} width="8" height="8" patternUnits="userSpaceOnUse"><path d="M0 0L8 0M0 0L0 8" stroke={cl} strokeWidth="2" fill="none"/></pattern>;
                if(pt==='dots') return <pattern key={id} id={id} width="8" height="8" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.5" fill={cl}/></pattern>; return null;
              })}
            </defs>
            <g id="canvas-content" transform={`translate(${pan.x}, ${pan.y}) scale(${zoom})`}>
              {gridType !== 'none' && (
                <rect x="-50000" y="-50000" width="100000" height="100000" fill={`url(#bg-${gridType})`} pointerEvents="none" className="export-ignore" />
              )}
              
              {bgImage && <image href={bgImage} x="0" y="0" width="100%" height="100%" opacity="0.6" pointerEvents="none" />}
              {sG.x!==null && <line x1={sG.x} y1="-50000" x2={sG.x} y2="50000" stroke="#22c55e" strokeWidth="1" strokeDasharray="4 4" pointerEvents="none" className="export-ignore"/>}
              {sG.y!==null && <line x1="-50000" y1={sG.y} x2="50000" y2={sG.y} stroke="#22c55e" strokeWidth="1" strokeDasharray="4 4" pointerEvents="none" className="export-ignore"/>}
              {sB && <rect x={Math.min(sB.sX,sB.cX)} y={Math.min(sB.sY,sB.cY)} width={Math.abs(sB.cX-sB.sX)} height={Math.abs(sB.cY-sB.sY)} fill="#9ca3af" fillOpacity="0.15" stroke="#4b5563" strokeDasharray="4 4" pointerEvents="none" className="export-ignore"/>}
              
              {displayItems.map(it => {
                const l = layers.find(ly=>ly.id===(it.layerId||layers[0].id))||layers[0]; if(!l.visible) return null;
                const isS = selectedIds.includes(it.id);
                
                const applySketch = isSketchMode && !['text', 'legend', 'entrance', 'icon_element', 'guide'].includes(it.type);
                const cm = {
                  opacity: l.faded ? (isS?0.5:0.25) : (isS?0.8:1), 
                  style: { filter: isS ? 'drop-shadow(0 0 2px rgba(0,0,0,0.1))' : 'none', mixBlendMode: it.blendMode || l.blendMode || 'normal' }, 
                  pointerEvents: l.locked ? 'none' : 'auto',
                  filter: applySketch ? 'url(#sketch-filter)' : 'none'
                };
                const md = e=>{e.stopPropagation(); onDn(e,it.id);};
                
                if(it.type==='legend') {
                  const visibleEntries = (it.entries || []).map((entry, idx) => ({ entry, idx })).filter(pair => pair.entry.visible !== false);
                  const h = 40 + visibleEntries.length * 30;
                  return <g key={it.id} transform={`translate(${it.x||20},${it.y||20})`} {...cm} onPointerDown={md}>
                    <rect x="0" y="0" width="200" height={h} fill="white" stroke="#e5e7eb" rx="8" opacity="0.95"/>
                    <text x="15" y="24" fontSize="14" fontWeight="bold">{it.title||'圖例說明'}</text>
                    {visibleEntries.map(({entry:e, idx}) => {
                      const yP = 50 + idx * 30, lSw = e.strokeWidth!==undefined?Math.min(e.strokeWidth,4):3, lSc = e.arrowSize||1, sh = lSw*1.2*lSc;
                      return <g key={idx} onPointerDown={event => { event.stopPropagation(); setItems(prev => prev.map(item => item.id===it.id ? {...item, entries: item.entries.map((entry, j) => j===idx ? {...entry, visible: false} : entry)} : item)); if(commitHistory) setTimeout(commitHistory, 0); }} style={{cursor:'pointer'}}>
                        {/arrow/.test(e.type) && <><path d={`M ${e.doubleArrow?15+sh:15} ${yP} L ${45-sh} ${yP}`} stroke={e.color} strokeWidth={lSw} strokeLinecap="round" strokeDasharray={e.dashPattern!=='none'?e.dashPattern:'none'} filter={isSketchMode?'url(#sketch-filter)':'none'}/>{RenderUtils.renderArrowHead(15,yP,45,yP,lSw,e.color,e.arrowStyle,lSc)}{e.doubleArrow&&RenderUtils.renderArrowHead(45,yP,15,yP,lSw,e.color,e.arrowStyle,lSc)}</>}
                        {e.type==='spline' && <><path d={`M 15 ${yP+5} Q 25 ${yP-10} 35 ${yP+5} T 45 ${yP}`} stroke={e.color} strokeWidth={lSw} strokeLinecap="round" strokeDasharray={e.dashPattern!=='none'?e.dashPattern:'none'} fill="none" filter={isSketchMode?'url(#sketch-filter)':'none'}/>{e.showArrow&&RenderUtils.renderArrowHead(35,yP+5,45,yP,lSw,e.color,e.arrowStyle,lSc)}</>}
                        {e.type==='road' && <line x1="15" y1={yP} x2="45" y2={yP} stroke={e.color} strokeWidth="6" opacity="0.4" strokeDasharray={e.dashPattern!=='none'?e.dashPattern:'none'} filter={isSketchMode?'url(#sketch-filter)':'none'}/>}
                        {e.type==='zone' && <rect x="15" y={yP-8} width="30" height="16" fill={RenderUtils.getFillUrl(e.color,e.fillPattern)} fillOpacity="0.25" stroke={e.strokeWidth===0?'none':(e.strokeColor||e.color)} strokeWidth={e.strokeWidth!==undefined?Math.min(e.strokeWidth,2):2} strokeDasharray={e.dashPattern!=='none'?e.dashPattern:'6 4'} filter={isSketchMode?'url(#sketch-filter)':'none'}/>}
                        {e.type==='circle_zone' && <circle cx="30" cy={yP} r="10" fill={RenderUtils.getFillUrl(e.color,e.fillPattern)} fillOpacity={e.fillOpacity??0.25} stroke={e.strokeWidth===0?'none':(e.strokeColor||e.color)} strokeWidth={e.strokeWidth!==undefined?Math.min(e.strokeWidth,2):2} strokeDasharray={e.dashPattern!=='none'?e.dashPattern:'6 4'} filter={isSketchMode?'url(#sketch-filter)':'none'}/>}
                        {e.type==='highlight' && <circle cx="30" cy={yP} r="10" fill={e.iconType==='solid' ? RenderUtils.getFillUrl(e.color, e.fillPattern) : "none"} fillOpacity={e.iconType==='solid' ? (e.fillOpacity??0.5) : 1} stroke={e.iconType==='solid' ? "none" : e.color} strokeWidth={e.iconType==='solid' ? 0 : (e.strokeWidth ?? 3)} opacity={e.iconType==='solid' ? 1 : 0.8} strokeDasharray={e.iconType!=='solid' && e.dashPattern!=='none'?e.dashPattern:'none'} filter={isSketchMode?'url(#sketch-filter)':'none'}/>}
                        {e.type==='radiating_circle' && <g transform={`translate(30,${yP})`}>
                          {e.iconType === 'thick_rings' ? <><circle cx="0" cy="0" r="8" fill="none" stroke={e.color} strokeWidth="3" opacity="0.4"/><circle cx="0" cy="0" r="3" fill={e.color}/></> :
                           e.iconType === 'thin_rings' ? <><circle cx="0" cy="0" r="10" fill="none" stroke={e.color} strokeWidth="1" opacity="0.4"/><circle cx="0" cy="0" r="6" fill="none" stroke={e.color} strokeWidth="1" opacity="0.6"/><circle cx="0" cy="0" r="2" fill={e.color}/></> :
                           e.iconType === 'dotted_rings' ? <><circle cx="0" cy="0" r="9" fill="none" stroke={e.color} strokeWidth="1.5" strokeDasharray="0.1 3" strokeLinecap="round" opacity="0.6"/><circle cx="0" cy="0" r="5" fill="none" stroke={e.color} strokeWidth="2.5" strokeDasharray="0.1 4" strokeLinecap="round" opacity="0.8"/><circle cx="0" cy="0" r="2" fill={e.color}/></> :

                  {measurePoints.map((p, i) => <circle key={`mp-${i}`} cx={p.x} cy={p.y} r="6" fill="#ff6b6b" stroke="white" strokeWidth="2" />)}
                  {measurePoints.length > 0 && <line x1={measurePoints[0].x} y1={measurePoints[0].y} x2={measurePoints[measurePoints.length-1].x} y2={measurePoints[measurePoints.length-1].y} stroke="#ff6b6b" strokeWidth="2" strokeDasharray="4 4" />}
                </g>
              )}
              {measureResults.length > 0 && (
                <g className="export-ignore">
                  {measureResults.map((r, i) => {
                    const mx = (r.p1.x + r.p2.x) / 2;
                    const my = (r.p1.y + r.p2.y) / 2;
                    const distance = (Math.hypot(r.p2.x - r.p1.x, r.p2.y - r.p1.y) / pixelsPerMm).toFixed(2);
                    return (
                      <g key={`mr-${i}`}>
                        <line x1={r.p1.x} y1={r.p1.y} x2={r.p2.x} y2={r.p2.y} stroke="#3b82f6" strokeWidth="2" />
                        <circle cx={r.p1.x} cy={r.p1.y} r="5" fill="#3b82f6" />
                        <circle cx={r.p2.x} cy={r.p2.y} r="5" fill="#3b82f6" />
                        <text x={mx} y={my-8} fontSize="12" fontWeight="bold" fill="#3b82f6" textAnchor="middle" backgroundColor="white" style={{background:'white', padding:'2px 4px', borderRadius:'3px'}}>{distance} mm</text>
                      </g>
                    );
                  })}
                </g>
              )}
              
              {/* Handles UI (No filters here) */}
              {selectedIds.length===1 && activeTool==='select' && (() => {
                const it = items.find(i=>i.id===selectedIds[0]); if(!it) return null;
                const md = (e,h) => {e.stopPropagation(); setDH(h);};
                return <g className="export-ignore">
                  {it.points?.map((p,i)=>(
                    <g key={`p-${i}`}>
                      <circle cx={p.x} cy={p.y} r="22" fill="rgba(0,0,0,0.01)" pointerEvents="all" className="export-ignore" onPointerDown={e=>md(e,{t:'pt',i})} />
                      <circle cx={p.x} cy={p.y} r="5" fill="white" stroke="#000" onPointerDown={e=>md(e,{t:'pt',i})} />
                    </g>
                  ))}
                  {it.type==='zone'&&GeometryUtils.getZoneSubPaths(it).map((pl,pi)=>(
                    <g key={pi}>
                      {pl.map((p,pti)=>(
                        <g key={`${pi}-${pti}`}>
                          <circle cx={p.x} cy={p.y} r="22" fill="rgba(0,0,0,0.01)" pointerEvents="all" className="export-ignore" onPointerDown={e=>md(e,{t:'zpt',pi,pti})} />
                          <circle cx={p.x} cy={p.y} r="5" fill="white" stroke="#000" onPointerDown={e=>md(e,{t:'zpt',pi,pti})} />
                        </g>
                      ))}
                    </g>
                  ))}
                  {(it.type==='highlight' || it.type === 'radiating_circle' || it.type==='circle_zone')&&(
                    <g>
                      <circle cx={it.cx+it.r} cy={it.cy} r="22" fill="rgba(0,0,0,0.01)" pointerEvents="all" className="export-ignore" onPointerDown={e=>md(e,'r')} />
                      <circle cx={it.cx+it.r} cy={it.cy} r="5" fill="white" stroke="#3b82f6" onPointerDown={e=>md(e,'r')} />
                    </g>
                  )}
                  {it.type==='curve_arrow'&&(() => {
                    let cx = it.cx ?? (Math.abs(it.x2 - it.x1) > Math.abs(it.y2 - it.y1) ? it.x1 : it.x2);
                    let cy = it.cy ?? (Math.abs(it.x2 - it.x1) > Math.abs(it.y2 - it.y1) ? it.y2 : it.y1);
                    return <>
                      <g key="start">
                        <circle cx={it.x1} cy={it.y1} r="22" fill="rgba(0,0,0,0.01)" pointerEvents="all" className="export-ignore" onPointerDown={e=>md(e,'s')} />
                        <circle cx={it.x1} cy={it.y1} r="5" fill="white" stroke="#000" onPointerDown={e=>md(e,'s')} />
                      </g>
                      <g key="center">
                        <circle cx={cx} cy={cy} r="22" fill="rgba(0,0,0,0.01)" pointerEvents="all" className="export-ignore" onPointerDown={e=>md(e,'c')} />
                        <circle cx={cx} cy={cy} r="5" fill="white" stroke="#999" onPointerDown={e=>md(e,'c')} />
                      </g>
                      <g key="end">
                        <circle cx={it.x2} cy={it.y2} r="22" fill="rgba(0,0,0,0.01)" pointerEvents="all" className="export-ignore" onPointerDown={e=>md(e,'e')} />
                        <circle cx={it.x2} cy={it.y2} r="5" fill="white" stroke="#000" onPointerDown={e=>md(e,'e')} />
                      </g>
                    </>;
                  })()}
                </g>;
              })()}
            </g>
          </svg>
        </div>
      );
    };

    function DiagramAssistant() {
      const [items, setItems] = useState([]);
      const [selectedIds, setSelectedIds] = useState([]);
      const [clipboard, setClipboard] = useState([]);
      const [activeTool, setActiveTool] = useState('select');
      const [activeColor, setActiveColor] = useState(COLORS[6]);
      const [bgImage, setBgImage] = useState(null);
      const [snapEnabled, setSnapEnabled] = useState(true);
      const [gridType, setGridType] = useState('dots'); 
      const [isSketchMode, setIsSketchMode] = useState(false);
      const [layers, setLayers] = useState([{ id: 'layer-1', name: '圖層 1', visible: true, locked: false, faded: false, isFolder: false, blendMode: 'normal' }]);
      const [activeLayerId, setActiveLayerId] = useState('layer-1');
      const [canUndo, setCanUndo] = useState(false);
      const [canRedo, setCanRedo] = useState(false);
      const [snapshots, setSnapshots] = useState([]);
      const [pan, setPan] = useState({x:0, y:0});
      const [zoom, setZoom] = useState(1);
      const [measurePoints, setMeasurePoints] = useState([]);
      const [measureResults, setMeasureResults] = useState([]);
      const [pixelsPerMm, setPixelsPerMm] = useState(3.78);
      const [scaleLabel, setScaleLabel] = useState('');
      const [scaleReferenceMm, setScaleReferenceMm] = useState('1000');
      const [customIcons, setCustomIcons] = useState(() => {
        const saved = safeGetLocalStorage('customIcons');
        if (!saved) return {};
        try {
          return JSON.parse(saved);
        } catch (err) {
          console.warn('Invalid customIcons in localStorage, resetting', err);
          safeRemoveLocalStorage('customIcons');
          return {};
        }
      });
      const [showRightPanel, setShowRightPanel] = useState(true);
      const [showToolbar, setShowToolbar] = useState(true);
      const toggleToolbar = () => setShowToolbar(prev => !prev);
      const [topbarStage, setTopbarStage] = useState(0); // 0: all, 1: hide second row, 2: hide all
      const advanceTopbarStage = () => setTopbarStage(prev => (prev >= 2 ? 0 : prev + 1));
      const [locale, setLocale] = useState(() => safeGetLocalStorage('locale') || 'zh');
      const [isTabletSidePanel, setIsTabletSidePanel] = useState(false);
      const [projectLoaded, setProjectLoaded] = useState(false);

      const saveTimeoutRef = useRef(null);
      const latestProjectStateRef = useRef(null);

      const hm = useRef(null);
      const fileInputRef = useRef(null);

      useEffect(() => {
        safeSetLocalStorage('locale', locale);
      }, [locale]);

      useEffect(() => {
        let didRestore = false;
        const restore = async () => {
          try {
            const saved = await loadProjectState();
            if (saved) {
              if (Array.isArray(saved.items)) setItems(saved.items);
              if (Array.isArray(saved.layers)) setLayers(saved.layers);
              if (saved.activeLayerId) setActiveLayerId(saved.activeLayerId);
              if (saved.pan) setPan(saved.pan);
              if (typeof saved.zoom === 'number') setZoom(saved.zoom);
              if (saved.bgImage) setBgImage(saved.bgImage);
              if (Array.isArray(saved.measurePoints)) setMeasurePoints(saved.measurePoints);
              if (Array.isArray(saved.measureResults)) setMeasureResults(saved.measureResults);
              if (typeof saved.pixelsPerMm === 'number') setPixelsPerMm(saved.pixelsPerMm);
              if (typeof saved.scaleLabel === 'string') setScaleLabel(saved.scaleLabel);
              if (typeof saved.snapEnabled === 'boolean') setSnapEnabled(saved.snapEnabled);
              if (saved.gridType) setGridType(saved.gridType);
              if (typeof saved.isSketchMode === 'boolean') setIsSketchMode(saved.isSketchMode);
              if (hm.current) {
                hm.current.hist = [[saved.items || []]];
                hm.current.idx = 0;
                hm.current.update();
              }
            }
          } catch (err) {
            console.warn('Restore failed', err);
          } finally {
            didRestore = true;
            setProjectLoaded(true);
          }
        };
        restore();
        const timeout = setTimeout(() => {
          if (!didRestore) {
            console.warn('Restore timed out, continuing without persisted state');
            setProjectLoaded(true);
          }
        }, 3000);
        return () => clearTimeout(timeout);
      }, []);

      useEffect(() => {
        latestProjectStateRef.current = getProjectPayload();
      }, [items, layers, activeLayerId, pan, zoom, bgImage, measurePoints, measureResults, pixelsPerMm, snapEnabled, gridType, isSketchMode]);

      useEffect(() => {
        if (!projectLoaded) return;
        if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
        saveTimeoutRef.current = setTimeout(() => {
          saveProjectState(getProjectPayload());
          saveTimeoutRef.current = null;
        }, 200);
        return () => {
          if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
        };
      }, [projectLoaded, items, layers, activeLayerId, pan, zoom, bgImage, measurePoints, measureResults, pixelsPerMm, snapEnabled, gridType, isSketchMode]);

      useEffect(() => {
        const flush = () => {
          if (latestProjectStateRef.current) saveProjectState(latestProjectStateRef.current);
        };
        const onVisibility = () => {
          if (document.hidden) flush();
        };
        window.addEventListener('pagehide', flush);
        window.addEventListener('visibilitychange', onVisibility);
        window.addEventListener('beforeunload', flush);
        return () => {
          window.removeEventListener('pagehide', flush);
          window.removeEventListener('visibilitychange', onVisibility);
          window.removeEventListener('beforeunload', flush);
        };
      }, []);

      useEffect(() => {
        const updateTabletLayout = () => {
          const w = window.innerWidth;
          const h = window.innerHeight;
          const ratio = w / h;
          setIsTabletSidePanel(w >= 768 && ratio >= 1.1 && ratio <= 1.6 && w >= h);
        };
        updateTabletLayout();
        window.addEventListener('resize', updateTabletLayout);
        return () => window.removeEventListener('resize', updateTabletLayout);
      }, []);

      const t = (key, params) => {
        let text = TRANSLATIONS[locale]?.[key] || TRANSLATIONS['zh'][key] || key;
        if (params && typeof params === 'object') {
          Object.keys(params).forEach(k => {
            text = text.replace(new RegExp(`\\{${k}\\}`, 'g'), params[k]);
          });
        }
        return text;
      };
      const svgInputRef = useRef(null);
      const imageItemInputRef = useRef(null);

      const getProjectPayload = () => ({
        items,
        layers,
        activeLayerId,
        pan,
        zoom,
        bgImage,
        measurePoints,
        measureResults,
        pixelsPerMm,
        scaleLabel,
        snapEnabled,
        gridType,
        isSketchMode
      });

      if(!hm.current) hm.current = new HistoryManager(setItems, setCanUndo, setCanRedo, setSelectedIds);
      const commitHistory = () => { setItems(p => { hm.current.push(p); return p; }); };

      const saveSnapshot = () => {
        const snapshotItems = JSON.parse(JSON.stringify(items));
        setSnapshots(prev => [...prev, { id: `snapshot-${Date.now()}`, name: `${t('snapshot')} ${prev.length + 1}`, items: snapshotItems, createdAt: Date.now() }]);
      };

      const loadSnapshot = (id) => {
        const snapshot = snapshots.find(s => s.id === id);
        if (!snapshot) return;
        setItems(JSON.parse(JSON.stringify(snapshot.items)));
        setSelectedIds([]);
        setTimeout(commitHistory, 0);
      };
      
      const handleColorChange = (c) => {
        setActiveColor(c);
        if (selectedIds.length > 0) {
          setItems(p => p.map(i => selectedIds.includes(i.id) ? { ...i, color: c } : i));
          setTimeout(commitHistory, 0);
        }
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setBgImage(event.target.result);
          reader.readAsDataURL(file);
        }
        e.target.value = '';
      };

      const handleImageItemUpload = (e) => {
        const file = e.target.files?.[0];
        if (!file) {
          return;
        }
        if (!file.type.startsWith('image/')) {
          alert('請選擇圖片檔');
          e.target.value = '';
          return;
        }
        const reader = new FileReader();
        reader.onload = (event) => {
          const src = event.target.result;
          const img = new Image();
          img.onload = () => {
            const maxSize = 400;
            let width = img.width;
            let height = img.height;
            if (width > maxSize || height > maxSize) {
              const ratio = Math.min(maxSize / width, maxSize / height);
              width = Math.round(width * ratio);
              height = Math.round(height * ratio);
            }
            const newItem = {
              id: Date.now(),
              type: 'image',
              x: 200,
              y: 200,
              width,
              height,
              src,
              layerId: activeLayerId,
            };
            setItems(prev => [...prev, newItem]);
            setSelectedIds([newItem.id]);
            setActiveTool('select');
            setTimeout(commitHistory, 0);
          };
          img.src = src;
        };
        reader.readAsDataURL(file);
        e.target.value = '';
      };

      const clearBackground = () => {
        setBgImage(null);
      };

      const handleSVGUpload = (e) => {
        const file = e.target.files[0];
        if (file && (file.type === 'image/svg+xml' || file.name.endsWith('.svg'))) {
          const reader = new FileReader();
          reader.onload = (event) => {
            const svgContent = event.target.result;
            const iconName = file.name.replace('.svg', '') || 'custom_icon_' + Date.now();
            const newCustomIcons = {
              ...customIcons,
              [iconName]: svgContent
            };
            setCustomIcons(newCustomIcons);
            safeSetLocalStorage('customIcons', JSON.stringify(newCustomIcons));
            alert(`已上傳自定義ICON: ${iconName}`);
          };
          reader.readAsText(file);
        } else {
          alert('請選擇有效的SVG文件');
        }
      };

      const saveCustomIconLibrary = () => {
        const dataStr = JSON.stringify(customIcons, null, 2);
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        const exportFileDefaultName = `custom_icons_${new Date().toISOString().slice(0,10)}.json`;
        const linkElement = document.createElement('a');
        linkElement.setAttribute('href', dataUri);
        linkElement.setAttribute('download', exportFileDefaultName);
        linkElement.click();
      };

      const importCustomIconLibrary = (e) => {
        const file = e.target.files[0];
        if (file && file.type === 'application/json') {
          const reader = new FileReader();
          reader.onload = (event) => {
            try {
              const imported = JSON.parse(event.target.result);
              const merged = {...customIcons, ...imported};
              setCustomIcons(merged);
              safeSetLocalStorage('customIcons', JSON.stringify(merged));
              alert(`已匯入 ${Object.keys(imported).length} 個自定義ICON`);
            } catch (err) {
              alert('JSON文件格式錯誤');
            }
          };
          reader.readAsText(file);
        }
      };

      const del = () => {
        if (selectedIds.length === 0) return;
        setItems(p => p.filter(i => !selectedIds.includes(i.id)));
        setSelectedIds([]);
        setTimeout(() => { if (typeof commitHistory === 'function') commitHistory(); }, 0);
      };

      const openNewFile = () => {
        setItems([]);
        setSelectedIds([]);
        setClipboard([]);
        setActiveTool('select');
        setActiveColor(COLORS[6]);
        setBgImage(null);
        setSnapEnabled(true);
        setGridType('dots');
        setIsSketchMode(false);
        setLayers([{ id: 'layer-1', name: '圖層 1', visible: true, locked: false, faded: false, isFolder: false }]);
        setActiveLayerId('layer-1');
        setPan({ x: 0, y: 0 });
        setZoom(1);
        setMeasurePoints([]);
        setMeasureResults([]);
        if (hm.current) {
          hm.current.hist = [[]];
          hm.current.idx = 0;
          hm.current.update();
        }
      };

      const copySelection = () => {
        if (selectedIds.length === 0) return;
        const copied = items.filter(i => selectedIds.includes(i.id)).map(i => JSON.parse(JSON.stringify(i)));
        setClipboard(copied);
      };

      const pasteClipboard = () => {
        if (clipboard.length === 0) return;
        const pasted = clipboard.map((item, index) => {
          const res = JSON.parse(JSON.stringify(item));
          res.id = Date.now() + Math.random() + index;
          if (res.x !== undefined) res.x += 20;
          if (res.y !== undefined) res.y += 20;
          if (res.cx !== undefined) res.cx += 20;
          if (res.cy !== undefined) res.cy += 20;
          if (res.x1 !== undefined) { res.x1 += 20; res.y1 += 20; res.x2 += 20; res.y2 += 20; }
          if (res.points) res.points = res.points.map(p => ({ x: p.x + 20, y: p.y + 20 }));
          if (res.subPaths) res.subPaths = res.subPaths.map(pl => pl.map(p => ({ x: p.x + 20, y: p.y + 20 })));
          return res;
        });
        setItems(p => [...p, ...pasted]);
        setSelectedIds(pasted.map(i => i.id));
        setTimeout(() => { if (typeof commitHistory === 'function') commitHistory(); }, 0);
      };

      const undo = () => hm.current.undo();
      const redo = () => hm.current.redo();
      const handleMergeLines = () => { const r=GeometryUtils.handleMergeLines(items,selectedIds); if(r){setItems(r.newItems); setSelectedIds(r.newSelectedIds); setTimeout(commitHistory,0);} };
      const handleSmartFill = () => {
        const eligible = item => item.type==='zone' || item.type==='circle_zone' || item.type==='triangle_marker' || (item.type==='highlight' && item.iconType==='solid');
        const selectedItems = items.filter(i => selectedIds.includes(i.id) && eligible(i));
        const targets = selectedItems.length > 0 ? selectedItems : items.filter(i => eligible(i));
        if (targets.length === 0) {
          alert(t('alertSmartFillNoTargets'));
          return;
        }
        const choosePattern = item => {
          const area = item.type === 'zone' ? GeometryUtils.getZoneArea(item) : item.type === 'circle_zone' ? Math.PI * Math.pow(item.r || 0, 2) : 4000;
          if (item.fillPattern && item.fillPattern !== 'solid') return item.fillPattern;
          if (area > 25000) return 'crosshatch';
          if (area > 8000) return 'stripe-diagonal';
          return 'dots';
        };
        const updatedItems = items.map(item => {
          if (!targets.some(t => t.id === item.id)) return item;
          return {
            ...item,
            fillPattern: choosePattern(item),
            fillOpacity: item.fillOpacity && item.fillOpacity > 0.15 ? item.fillOpacity : 0.28,
            strokeWidth: item.strokeWidth === undefined ? 0 : item.strokeWidth,
          };
        });
        setItems(updatedItems);
        setTimeout(commitHistory, 0);
        alert(t('smartFillDone'));
      };
      const handleFillClosedArea = () => {
        const selectedLines = items.filter(i => selectedIds.includes(i.id) && ['arrow','dashed_arrow','road','solid_line','dashed_line','spline','curve_arrow'].includes(i.type));
        if (selectedLines.length < 3) {
          alert(t('alertFillClosedAreaInvalid'));
          return;
        }
        const loop = GeometryUtils.getClosedLoopFromLineItems(selectedLines);
        if (!loop) {
          alert(t('alertFillClosedAreaInvalid'));
          return;
        }
        const newZone = {
          id: Date.now(),
          type: 'zone',
          layerId: activeLayerId,
          color: activeColor,
          subPaths: [loop],
          fillPattern: 'solid',
          fillOpacity: 0.25,
          strokeWidth: 1,
          dashPattern: 'none',
          cornerRadius: 0,
          visible: true,
        };

      const handleUngroup = () => { const gIds=selectedIds.map(id=>items.find(i=>i.id===id)?.groupId).filter(Boolean); setItems(p=>p.map(i=>gIds.includes(i.groupId)?{...i,groupId:undefined}:i)); setTimeout(commitHistory,0); };

      const handleAlign = (type) => {
        if (selectedIds.length < 2) return;
        const targets = items.filter(i => selectedIds.includes(i.id));
        const boxes = targets.map(i => ({ id: i.id, box: GeometryUtils.getBoundingBox(i) }));
        const overallBox = {
           minX: Math.min(...boxes.map(b => b.box.minX)),
           maxX: Math.max(...boxes.map(b => b.box.maxX)),
           minY: Math.min(...boxes.map(b => b.box.minY)),
           maxY: Math.max(...boxes.map(b => b.box.maxY)),
        };
        
        setItems(p => p.map(i => {
          if (!selectedIds.includes(i.id)) return i;
          const b = boxes.find(bx => bx.id === i.id).box;
          let dx = 0, dy = 0;
          
          if (type === 'left') dx = overallBox.minX - b.minX;
          if (type === 'center') dx = (overallBox.minX + overallBox.maxX)/2 - (b.minX + b.maxX)/2;
          if (type === 'right') dx = overallBox.maxX - b.maxX;
          if (type === 'top') dy = overallBox.minY - b.minY;
          if (type === 'bottom') dy = overallBox.maxY - b.maxY;

          if(i.points) return {...i, points: i.points.map(pt=>({x: pt.x+dx, y: pt.y+dy}))};
          if(i.type==='zone') return {...i, subPaths: GeometryUtils.getZoneSubPaths(i).map(pl=>pl.map(pt=>({x: pt.x+dx, y: pt.y+dy})))};
          if(i.type==='highlight' || i.type==='radiating_circle' || i.type==='circle_zone') return {...i, cx: i.cx+dx, cy: i.cy+dy};
          if(i.type==='curve_arrow') {
             const res = {...i, x1: i.x1+dx, y1: i.y1+dy, x2: i.x2+dx, y2: i.y2+dy};
             if (i.cx!==undefined) res.cx += dx; if(i.cy!==undefined) res.cy += dy;
             return res;

        }));

      const handleDistribute = (axis) => {
        if (selectedIds.length < 3) return;
        const targets = items.filter(i => selectedIds.includes(i.id));
        const boxes = targets.map(i => {
           const box = GeometryUtils.getBoundingBox(i);

        });
        boxes.sort((a,b) => axis === 'h' ? a.cx - b.cx : a.cy - b.cy);
        const minC = axis === 'h' ? boxes[0].cx : boxes[0].cy;
        const maxC = axis === 'h' ? boxes[boxes.length-1].cx : boxes[boxes.length-1].cy;
        const step = (maxC - minC) / (boxes.length - 1);

        setItems(p => p.map(i => {
          if (!selectedIds.includes(i.id)) return i;
          const idx = boxes.findIndex(b => b.id === i.id);
          if (idx === 0 || idx === boxes.length - 1) return i; 
          const targetC = minC + step * idx;
          const b = boxes[idx];
          const dx = axis === 'h' ? targetC - b.cx : 0;
          const dy = axis === 'v' ? targetC - b.cy : 0;

          if(i.points) return {...i, points: i.points.map(pt=>({x: pt.x+dx, y: pt.y+dy}))};
          if(i.type==='zone') return {...i, subPaths: GeometryUtils.getZoneSubPaths(i).map(pl=>pl.map(pt=>({x: pt.x+dx, y: pt.y+dy})))};
          if(i.type==='highlight' || i.type==='radiating_circle' || i.type==='circle_zone') return {...i, cx: i.cx+dx, cy: i.cy+dy};
          if(i.type==='curve_arrow') {
             const res = {...i, x1: i.x1+dx, y1: i.y1+dy, x2: i.x2+dx, y2: i.y2+dy};
             if (i.cx!==undefined) res.cx += dx; if(i.cy!==undefined) res.cy += dy;
             return res;

          if(i.type==='icon_element') {

        }));

      const handleMirror = (direction) => {
        if (selectedIds.length === 0) return;
        const targets = items.filter(i => selectedIds.includes(i.id));
        const boxes = targets.map(i => ({ id: i.id, box: GeometryUtils.getBoundingBox(i) }));
        const overallBox = {

          maxX: Math.max(...boxes.map(b => b.box.maxX)),
          minY: Math.min(...boxes.map(b => b.box.minY)),
          maxY: Math.max(...boxes.map(b => b.box.maxY)),
        };
        const centerX = (overallBox.minX + overallBox.maxX) / 2;
        const centerY = (overallBox.minY + overallBox.maxY) / 2;
        const mirrorX = x => centerX * 2 - x;
        const mirrorY = y => centerY * 2 - y;
        const transformPoint = pt => ({
          x: direction === 'h' ? mirrorX(pt.x) : pt.x,
          y: direction === 'v' ? mirrorY(pt.y) : pt.y,
        });

        setItems(p => p.map(i => {
          if (!selectedIds.includes(i.id)) return i;
          if (i.points) return { ...i, points: i.points.map(transformPoint) };
          if (i.type === 'zone') return { ...i, subPaths: GeometryUtils.getZoneSubPaths(i).map(path => path.map(transformPoint)) };
          if (i.type === 'highlight' || i.type === 'radiating_circle' || i.type === 'circle_zone') {
            return {
              ...i,
              cx: direction === 'h' ? mirrorX(i.cx) : i.cx,
              cy: direction === 'v' ? mirrorY(i.cy) : i.cy,
            };
          }
          if (i.type === 'curve_arrow') {
            const res = {
              ...i,
              x1: direction === 'h' ? mirrorX(i.x1) : i.x1,
              y1: direction === 'v' ? mirrorY(i.y1) : i.y1,
              x2: direction === 'h' ? mirrorX(i.x2) : i.x2,
              y2: direction === 'v' ? mirrorY(i.y2) : i.y2,
            };
            if (i.cx !== undefined) res.cx = direction === 'h' ? mirrorX(i.cx) : i.cx;
            if (i.cy !== undefined) res.cy = direction === 'v' ? mirrorY(i.cy) : i.cy;
            return res;
          }
          if (i.type === 'icon_element') return {
            ...i,
            x: direction === 'h' ? mirrorX(i.x) : i.x,
            y: direction === 'v' ? mirrorY(i.y) : i.y,
          };
          return {
            ...i,
            x: direction === 'h' ? mirrorX(i.x || 0) : (i.x || 0),
            y: direction === 'v' ? mirrorY(i.y || 0) : (i.y || 0),
          };
        }));

      const hexToRgb = (hex) => {
        if (!hex) return { r: 0, g: 0, b: 0 };
        const clean = hex.replace('#', '');
        const full = clean.length === 3 ? clean.split('').map(ch => ch + ch).join('') : clean;
        const r = parseInt(full.slice(0, 2), 16);
        const g = parseInt(full.slice(2, 4), 16);
        const b = parseInt(full.slice(4, 6), 16);
        return { r: r / 255, g: g / 255, b: b / 255 };
      };

      const toDxfColorIndex = (hex) => {
        const { r, g, b } = hexToRgb(hex);
        if (r > 0.8 && g < 0.4 && b < 0.4) return 1;
        if (r < 0.4 && g > 0.8 && b < 0.4) return 3;
        if (r < 0.4 && g < 0.4 && b > 0.8) return 5;
        if (r > 0.8 && g > 0.8 && b < 0.4) return 2;
        if (r > 0.8 && g < 0.4 && b > 0.8) return 6;
        if (r < 0.4 && g > 0.8 && b > 0.8) return 4;
        if (r > 0.7 && g > 0.7 && b > 0.7) return 7;
        return 8;
      };

      const escapeDxfText = (text) => String(text || '').replace(/\\/g, '\\\\').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
      const escapePdfText = (text) => String(text || '').replace(/\\/g, '\\\\').replace(/\(/g, '\\(').replace(/\)/g, '\\)');

      const hasCJKText = (itemsToExport) => {
        const cjk = /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff\uf900-\ufaff\uac00-\ud7af]/;
        return itemsToExport.some(it => {

      const svgToDataUrl = (svgEl) => {
        const xml = new XMLSerializer().serializeToString(svgEl);

      const buildPdfFromJpeg = (jpegBytes, width, height) => {
        const encoder = new TextEncoder();
        const header = encoder.encode('%PDF-1.4\n%âãÏÓ\n');
        const pageContent = `q\n${width} 0 0 ${height} 0 0 cm\n/Im0 Do\nQ\n`;
        const pageContentBytes = encoder.encode(pageContent);

        const objectBodies = [
          encoder.encode('1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n'),
          encoder.encode('2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n'),
          encoder.encode(`3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${width} ${height}] /Resources << /XObject << /Im0 4 0 R >> /ProcSet [/PDF /ImageC] >> /Contents 5 0 R >>\nendobj\n`),
          encoder.encode(`4 0 obj\n<< /Type /XObject /Subtype /Image /Width ${width} /Height ${height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpegBytes.length} >>\nstream\n`),
          jpegBytes,
          encoder.encode('\nendstream\nendobj\n'),
          encoder.encode(`5 0 obj\n<< /Length ${pageContentBytes.length} >>\nstream\n`),
          pageContentBytes,
          encoder.encode('\nendstream\nendobj\n'),
        ];

        const objectOffsets = [0];
        let currentOffset = header.length;
        const objectStarts = [currentOffset];
        const objects = [1, 2, 3, 4, 4, 4, 5, 5, 5];
        let lastObject = null;
        const chunks = [header];

        objectBodies.forEach((body, index) => {
          const objectId = objects[index];
          if (objectId !== lastObject) {
            objectStarts[objectId] = currentOffset;
            lastObject = objectId;
          }
          chunks.push(body);
          currentOffset += body.length;
        });

        const xrefOffset = currentOffset;
        const xrefHeader = encoder.encode(`xref\n0 6\n0000000000 65535 f \n`);
        chunks.push(xrefHeader);
        currentOffset += xrefHeader.length;

        for (let objId = 1; objId <= 5; objId += 1) {
          const offset = objectStarts[objId] || 0;
          const line = `${String(offset).padStart(10, '0')} 00000 n \n`;
          const lineBytes = encoder.encode(line);
          chunks.push(lineBytes);
          currentOffset += lineBytes.length;
        }

        const trailer = encoder.encode(`trailer << /Size 6 /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`);
        chunks.push(trailer);
        return new Blob(chunks, { type: 'application/pdf' });
      };

      const exportPdfAsImage = async (svgEl, width, height) => {
        const img = new Image();

        const dataUrl = svgToDataUrl(svgEl);

        img.src = dataUrl;
        await loaded;
        const scale = 2;
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(width * scale);
        canvas.height = Math.round(height * scale);
        const ctx = canvas.getContext('2d');
        ctx.setTransform(scale, 0, 0, scale, 0, 0);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        const jpegDataUrl = canvas.toDataURL('image/jpeg', 0.95);
        const base64 = jpegDataUrl.split(',')[1] || '';
        const jpegBin = atob(base64);
        const jpegBytes = new Uint8Array(jpegBin.length);
        for (let i = 0; i < jpegBin.length; i += 1) {
          jpegBytes[i] = jpegBin.charCodeAt(i);
        }
        const blob = buildPdfFromJpeg(jpegBytes, width, height);
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);

      const buildDxf = (itemsToExport) => {
        const getLayerName = (layerId) => {
          const layer = layers.find(l => l.id === layerId);
          return layer ? layer.name.replace(/[^A-Za-z0-9_]/g, '_') : 'Layer0';
        };

        const lines = [];
        const append = (group, value) => { lines.push(group); if (value !== undefined) lines.push(String(value)); };

        append('0', 'SECTION'); append('2', 'HEADER'); append('0', 'ENDSEC');
        append('0', 'SECTION'); append('2', 'TABLES');
        append('0', 'TABLE'); append('2', 'LAYER');
        const usedDxfLayers = new Set();
        itemsToExport.map(it => layers.find(l => l.id === it.layerId)).filter(Boolean).forEach(layer => {
          const layerName = getLayerName(layer.id);
          if (usedDxfLayers.has(layerName)) return;
          usedDxfLayers.add(layerName);
          append('0', 'LAYER'); append('2', layerName); append('70', '0'); append('62', toDxfColorIndex('#4b5563')); append('6', 'CONTINUOUS');
        });
        append('0', 'ENDTAB'); append('0', 'ENDSEC');
        append('0', 'SECTION'); append('2', 'ENTITIES');

        const addPolyline = (points, layerId, color, closed = false) => {
          if (!points || points.length < 2) return;
          const layerName = getLayerName(layerId);
          append('0', 'LWPOLYLINE'); append('8', layerName); append('62', toDxfColorIndex(color)); append('90', points.length);
          append('70', closed ? '1' : '0');
          points.forEach(pt => { append('10', pt.x.toFixed(3)); append('20', pt.y.toFixed(3)); });
        };

        const addCircle = (cx, cy, r, layerId, color) => {
          if (r <= 0) return;
          const layerName = getLayerName(layerId);
          append('0', 'CIRCLE'); append('8', layerName); append('62', toDxfColorIndex(color)); append('10', cx.toFixed(3)); append('20', cy.toFixed(3)); append('40', r.toFixed(3));
        };

        const addText = (x, y, content, layerId, color, size = 12) => {
          const layerName = getLayerName(layerId);
          append('0', 'TEXT'); append('8', layerName); append('62', toDxfColorIndex(color)); append('10', x.toFixed(3)); append('20', y.toFixed(3)); append('40', size.toFixed(3)); append('1', escapeDxfText(content));
        };

        itemsToExport.forEach(it => {
          if (!it || it.type === 'guide') return;
          const layerId = it.layerId || (layers[0] && layers[0].id);
          const color = it.color || '#000000';

          if (it.points) {
            const pts = GeometryUtils.getVisualPoints(it.points, it);
            addPolyline(pts, layerId, color, false);
            return;
          }

          if (it.type === 'zone') {
            GeometryUtils.getZoneSubPaths(it).forEach(path => addPolyline(path, layerId, color, true));
            return;
          }

          if (it.type === 'circle_zone' || it.type === 'highlight' || it.type === 'radiating_circle') {
            const cx = it.cx || 0; const cy = it.cy || 0; const r = it.r || 0;
            addCircle(cx, cy, r, layerId, color);
            return;
          }

          if (it.type === 'leader_text') {
            const p0 = it.points[0]; const p1 = it.points[1];
            if (p0 && p1) addPolyline([p0, p1], layerId, color, false);
            addText(p1.x, p1.y, `${it.textTop || ''}${it.textBottom ? '\\P' + it.textBottom : ''}`, layerId, color, it.fontSize || 14);
            return;
          }

          if (it.type === 'text') {
            addText(it.x || 0, it.y || 0, String(it.text || '').replace(/\n/g, '\\P'), layerId, it.color || '#000000', it.fontSize || 16);
            return;
          }

          if (it.type === 'icon_element') {
            const label = it.iconType ? `${it.iconCategory || 'icon'}:${it.iconType}` : 'ICON';
            addText(it.x || 0, it.y || 0, label, layerId, color, 10);
            return;
          }

          if (it.type === 'entrance') {
            const x = it.x || 0, y = it.y || 0;
            addPolyline([{x: x - 30, y: y - 30}, {x: x + 30, y: y - 30}, {x: x + 30, y: y + 20}, {x: x - 30, y: y + 20}], layerId, color, true);
            addText(x, y, 'ENT', layerId, color, 12);
            return;
          }

          if (it.type === 'triangle_marker') {
            const x = it.x || 0, y = it.y || 0, s = 12;
            addPolyline([{x: x - s, y: y - s}, {x: x + s, y: y}, {x: x - s, y: y + s}], layerId, color, true);
            return;
          }

          if (it.type === 'node') {
            addCircle(it.x || 0, it.y || 0, 8, layerId, color);
            return;
          }

          if (it.type === 'image') {
            const x = it.x || 0, y = it.y || 0, w = it.width || 100, h = it.height || 100;
            addPolyline([{x: x, y: y}, {x: x + w, y: y}, {x: x + w, y: y + h}, {x: x, y: y + h}], layerId, color, true);
            addText(x + w / 2, y + h / 2, 'IMAGE', layerId, color, 10);
            return;
          }

          if (it.type === 'legend') {
            const x = it.x || 20, y = it.y || 20;
            addText(x, y, String(it.title || 'Legend'), layerId, color, 12);
            if (Array.isArray(it.entries)) {
              it.entries.forEach((entry, idx) => {
                addText(x, y + (idx + 1) * 14, entry.label || '', layerId, '#000000', 10);
              });
            }
            return;
          }
        });

        append('0', 'ENDSEC'); append('0', 'EOF');
        return lines.join('\n');
      };

      const exportDXF = () => {
        const svgEl = document.getElementById('main-canvas-svg');
        if (!svgEl) return;
        const visibleLayerIds = layers.filter(l => l.visible).map(l => l.id);
        const visibleItems = items.filter(it => visibleLayerIds.includes(it.layerId || layers[0]?.id));
        const dxfContent = buildDxf(visibleItems);
        const blob = new Blob([dxfContent], { type: 'application/dxf' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'analytical-planner-export.dxf';
        link.click();
      };

      const buildPdf = (itemsToExport, width, height) => {
        const pageWidth = width;
        const pageHeight = height;
        const toNum = (n) => Number(Number(n).toFixed(2));
        const formatPoint = (x, y) => `${toNum(x)} ${toNum(pageHeight - y)}`;
        const colorRgb = (hex) => {
          const c = hexToRgb(hex);
          return `${toNum(c.r)} ${toNum(c.g)} ${toNum(c.b)}`;
        };
        const dashArray = (pattern) => {
          if (!pattern || pattern === 'none') return '';
          const values = pattern.split(' ').map(v => Number(v) || 0).filter(v => v > 0);
          if (!values.length) return '';
          return `[${values.map(v => toNum(v)).join(' ')}] 0 d\n`;
        };
        const closeCircle = (cx, cy, r) => {
          const steps = 24;
          const pts = [];
          for (let i = 0; i <= steps; i += 1) {
            const theta = (Math.PI * 2 * i) / steps;
            pts.push({ x: cx + Math.cos(theta) * r, y: cy + Math.sin(theta) * r });
          }
          return pts;
        };
        const addPath = (points, options = {}) => {
          if (!points || points.length < 2) return '';
          let ops = '';
          if (options.dash) ops += dashArray(options.dash);
          ops += `${options.strokeColor ? `${options.strokeColor} RG\n` : ''}`;
          ops += `${options.fillColor ? `${options.fillColor} rg\n` : ''}`;
          if (options.lineWidth !== undefined) ops += `${toNum(options.lineWidth)} w\n`;
          ops += `${formatPoint(points[0].x, points[0].y)} m\n`;
          for (let i = 1; i < points.length; i += 1) {
            ops += `${formatPoint(points[i].x, points[i].y)} l\n`;
          }
          if (options.close) ops += 'h\n';
          const paintOp = options.fill && options.stroke ? 'B' : options.fill ? 'f' : 'S';
          ops += `${paintOp}\n`;
          if (options.dash) ops += '[] 0 d\n';
          return ops;
        };

        const layerNames = layers.filter(l => l.visible).map((layer, idx) => ({ layer, pdfKey: `L${idx}`, objId: 6 + idx }));
        const layerResource = layerNames.reduce((acc, item) => `${acc}/${item.pdfKey} ${item.objId} 0 R `, '');
        const layerOrder = layerNames.map(item => `(${item.layer.name}) ${item.objId} 0 R`).join(' ');

        const buildItemContent = (it) => {
          if (!it || it.type === 'guide') return '';
          const layer = layerNames.find(l => l.layer.id === it.layerId) || layerNames[0];
          const layerTag = layer ? layer.pdfKey : null;
          const color = colorRgb(it.color || '#000000');
          const stroke = `${color} RG`;
          const fill = `${color} rg`;
          const textColor = `${color} rg`;

          const wrapLayer = (content) => {
            if (!layerTag) return content;
            return `<</OC /${layerTag}>> BDC\n${content}EMC\n`;
          };

          if (it.points) {
            const pts = GeometryUtils.getVisualPoints(it.points, it);
            const path = addPath(pts, { strokeColor: color, lineWidth: it.strokeWidth || (it.type === 'road' ? 16 : 4), dash: it.dashPattern !== 'none' ? it.dashPattern : '', stroke: true, fill: false, close: false });
            return wrapLayer(path);
          }

          if (it.type === 'zone') {
            const content = GeometryUtils.getZoneSubPaths(it).map(path => addPath(path, { strokeColor: color, fillColor: fill, lineWidth: it.strokeWidth || 2, stroke: true, fill: true, close: true })).join('');
            return wrapLayer(content);
          }

          if (it.type === 'circle_zone' || it.type === 'highlight') {
            const cx = it.cx || 0; const cy = it.cy || 0; const r = it.r || 0;
            const points = closeCircle(cx, cy, r);
            const filled = it.type === 'circle_zone' || (it.type === 'highlight' && it.iconType === 'solid');
            const content = addPath(points, { strokeColor: color, fillColor: filled ? fill : null, lineWidth: it.strokeWidth || 2, stroke: !filled, fill: filled, close: true });
            return wrapLayer(content);
          }

          if (it.type === 'radiating_circle') {
            const cx = it.cx || 0; const cy = it.cy || 0; const r = it.r || 0;
            const points = closeCircle(cx, cy, r);
            return wrapLayer(addPath(points, { strokeColor: color, lineWidth: 1.5, fill: false, close: true }));
          }

          if (it.type === 'leader_text') {
            const p0 = it.points[0]; const p1 = it.points[1];
            const line = p0 && p1 ? addPath([p0, p1], { strokeColor: color, lineWidth: 1.5, dash: '', stroke: true }) : '';
            const label = `${it.textTop || ''}${it.textBottom ? '\\n' + it.textBottom : ''}`;
            const y = pageHeight - (p1?.y || 0);
            const textOps = `BT\n/F1 ${it.fontSize || 14} Tf\n${textColor}\n${toNum(p1.x || 0)} ${toNum(y)} Td\n(${escapePdfText(it.textTop || '')}) Tj\n` + (it.textBottom ? `0 -${toNum((it.fontSize || 14) * 1.2)} Td\n(${escapePdfText(it.textBottom)}) Tj\n` : '') + 'ET\n';
            return wrapLayer(line + textOps);
          }

          if (it.type === 'text') {
            const lines = String(it.text || '').split('\n');
            const tx = it.x || 0; const ty = pageHeight - (it.y || 0);
            let ops = `BT\n/F1 ${it.fontSize || 16} Tf\n${textColor}\n${toNum(tx)} ${toNum(ty)} Td\n(${escapePdfText(lines[0] || '')}) Tj\n`;
            for (let i = 1; i < lines.length; i += 1) {
              ops += `0 -${toNum((it.fontSize || 16) * 1.2)} Td\n(${escapePdfText(lines[i])}) Tj\n`;
            }
            ops += 'ET\n';
            return wrapLayer(ops);
          }

          if (it.type === 'icon_element') {
            const label = it.iconType || it.iconCategory || 'ICON';
            const x = it.x || 0; const y = pageHeight - (it.y || 0);
            const ops = `BT\n/F1 10 Tf\n${textColor}\n${toNum(x)} ${toNum(y)} Td\n(${escapePdfText(label)}) Tj\nET\n`;
            return wrapLayer(ops);
          }

          if (it.type === 'entrance') {
            const x = it.x || 0; const y = it.y || 0;
            const rect = addPath([{ x: x - 30, y: y - 30 }, { x: x + 30, y: y - 30 }, { x: x + 30, y: y + 20 }, { x: x - 30, y: y + 20 }], { strokeColor: color, lineWidth: 3, stroke: true, fill: false, close: true });
            const text = `BT\n/F1 12 Tf\n${textColor}\n${toNum(x)} ${toNum(pageHeight - y)} Td\n(ENT) Tj\nET\n`;
            return wrapLayer(rect + text);
          }

          if (it.type === 'triangle_marker') {
            const x = it.x || 0; const y = it.y || 0; const s = 12;
            const pts = [{ x: x - s, y: y - s }, { x: x + s, y: y }, { x: x - s, y: y + s }];
            return wrapLayer(addPath(pts, { strokeColor: color, lineWidth: 1.5, fill: true, close: true }));
          }

          if (it.type === 'node') {
            const pts = closeCircle(it.x || 0, it.y || 0, 8);
            return wrapLayer(addPath(pts, { strokeColor: color, lineWidth: 1.5, fill: false, close: true }));
          }

          if (it.type === 'image') {
            const x = it.x || 0; const y = it.y || 0; const w = it.width || 100; const h = it.height || 100;
            const pts = [{ x, y }, { x: x + w, y }, { x: x + w, y: y + h }, { x, y: y + h }];
            const rect = addPath(pts, { strokeColor: color, lineWidth: 1.5, fill: false, close: true });
            const text = `BT\n/F1 10 Tf\n${textColor}\n${toNum(x + w / 2)} ${toNum(pageHeight - (y + h / 2))} Td\n(IMAGE) Tj\nET\n`;
            return wrapLayer(rect + text);
          }

          if (it.type === 'legend') {
            const x = it.x || 20; const y = it.y || 20;
            let ops = `BT\n/F1 12 Tf\n${textColor}\n${toNum(x)} ${toNum(pageHeight - y)} Td\n(${escapePdfText(it.title || 'Legend')}) Tj\nET\n`;
            if (Array.isArray(it.entries)) {
              let offset = 1;
              it.entries.forEach((entry) => {
                const lineY = y + offset * 14;
                ops += `BT\n/F1 10 Tf\n${textColor}\n${toNum(x)} ${toNum(pageHeight - lineY)} Td\n(${escapePdfText(entry.label || '')}) Tj\nET\n`;
                offset += 1;
              });
            }
            return wrapLayer(ops);
          }

          return '';
        };

        const contentParts = itemsToExport.map(buildItemContent).filter(Boolean).join('');
        const streamBody = contentParts;
        const encoder = new TextEncoder();
        const streamLength = encoder.encode(streamBody).length;

        const objects = [];
        objects.push(`<< /Type /Catalog /Pages 2 0 R /OCProperties 5 0 R >>`);
        objects.push(`<< /Type /Pages /Kids [3 0 R] /Count 1 >>`);
        objects.push(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${toNum(pageWidth)} ${toNum(pageHeight)}] /Resources << /Font << /F1 4 0 R >> ${layerNames.length ? `/Properties << ${layerResource}>>` : ''} >> /Contents ${6 + layerNames.length} 0 R >>`);
        objects.push(`<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>`);
        const ocgRefs = layerNames.map(item => `${item.objId} 0 R`).join(' ');
        const orderArray = layerNames.map(item => `(${escapePdfText(item.layer.name)}) ${item.objId} 0 R`).join(' ');
        objects.push(`<< /OCGs [${ocgRefs}] /D << /Name (Layers) /Order [${orderArray}] >> >>`);
        layerNames.forEach(item => {
          objects.push(`<< /Type /OCG /Name (${escapePdfText(item.layer.name)}) >>`);
        });
        objects.push(`<< /Length ${streamLength} >>\nstream\n${streamBody}endstream`);

        let output = '%PDF-1.4\n%âãÏÓ\n';
        const offsets = [];
        let currentOffset = encoder.encode(output).length;
        objects.forEach((obj, index) => {
          offsets.push(currentOffset);
          const chunk = `${index + 1} 0 obj\n${obj}\nendobj\n`;
          output += chunk;
          currentOffset += encoder.encode(chunk).length;
        });
        const xrefPosition = currentOffset;
        const xrefHeader = `xref\n0 ${objects.length + 1}\n0000000000 65535 f \n`;
        output += xrefHeader;
        currentOffset += encoder.encode(xrefHeader).length;
        offsets.forEach(offset => {
          const line = `${String(offset).padStart(10, '0')} 00000 n \n`;
          output += line;
          currentOffset += encoder.encode(line).length;
        });
        const trailer = `trailer << /Size ${objects.length + 1} /Root 1 0 R >>\nstartxref\n${xrefPosition}\n%%EOF`;
        output += trailer;
        return output;
      };

      const exportPDF = async () => {
        const svgEl = document.getElementById('main-canvas-svg');
        if (!svgEl) return;
        const rect = svgEl.getBoundingClientRect();
        const visibleLayerIds = layers.filter(l => l.visible).map(l => l.id);
        const visibleItems = items.filter(it => visibleLayerIds.includes(it.layerId || layers[0]?.id));
        if (hasCJKText(visibleItems)) {
          await exportPdfAsImage(svgEl, rect.width, rect.height);
          return;
        }
        const pdfData = buildPdf(visibleItems, rect.width, rect.height);
        const blob = new Blob([pdfData], { type: 'application/pdf' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'analytical-planner-export.pdf';
        link.click();
      };
      
      const canMergeLines = items.filter(i=>selectedIds.includes(i.id)&&['arrow', 'dashed_arrow', 'road'].includes(i.type)).length>1;
      const canMergeZones = items.filter(i=>selectedIds.includes(i.id)&&i.type==='zone').length>1;
      const canGroup = selectedIds.length > 1;
      const canUngroup = selectedIds.some(id => items.find(i=>i.id===id)?.groupId);
      const canDistribute = selectedIds.length > 2;

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target?.tagName)) return;
          
          if (e.code === 'Space' && !e.ctrlKey && !e.metaKey && !e.altKey && !e.repeat) {
            e.preventDefault();
            const toolOrder = [
              'pan', 'select', 'eyedropper', 'guide_h', 'guide_v',
              'arrow', 'road', 'leader_text', 'curve_arrow', 'spline',
              'zone', 'circle_zone', 'highlight', 'radiating_circle', 'triangle_marker', 'icon_element', 'entrance', 'node', 'text'
            ];
            setActiveTool(prev => {
              const idx = toolOrder.indexOf(prev);
              if (e.shiftKey) return toolOrder[(idx - 1 + toolOrder.length) % toolOrder.length];
              return toolOrder[(idx + 1) % toolOrder.length];
            });
            return;
          }

          if (e.key === 'Alt' && !e.shiftKey && !e.ctrlKey && !e.metaKey && !e.repeat) {
            e.preventDefault();
            const toolOrder = [
              'pan', 'select', 'eyedropper', 'guide_h', 'guide_v',
              'arrow', 'road', 'leader_text', 'curve_arrow', 'spline',
              'zone', 'circle_zone', 'highlight', 'radiating_circle', 'triangle_marker', 'icon_element', 'entrance', 'node', 'text'
            ];
            setActiveTool(prev => {
              const idx = toolOrder.indexOf(prev);
              return toolOrder[(idx - 1 + toolOrder.length) % toolOrder.length];
            });
            return;
          }

          if (e.shiftKey && !e.ctrlKey && !e.metaKey && !e.altKey) {
            const key = e.key.toLowerCase();
            const toolMap = {
              'h': 'pan', 'v': 'select', 'i': 'eyedropper', 'x': 'guide_h', 'y': 'guide_v',
              'a': 'arrow', 'r': 'road', 'l': 'leader_text', 'c': 'curve_arrow', 'p': 'spline',
              'z': 'zone', 'j': 'circle_zone', 'o': 'highlight', 'b': 'radiating_circle', 'm': 'triangle_marker', 's': 'icon_element', 'e': 'entrance', 'n': 'node', 't': 'text'
            };
            if (toolMap[key]) {
              e.preventDefault();
              setActiveTool(toolMap[key]);
              return;
            }
            if (key === 'k') {
              e.preventDefault();
              setIsSketchMode(prev => !prev);
              return;
            }
          }

          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
            e.preventDefault(); if (e.shiftKey) redo(); else undo();
          } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c') {
            e.preventDefault(); copySelection();
          } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') {
            e.preventDefault(); pasteClipboard();
          } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
            e.preventDefault(); redo();
          } else if (e.key === 'Delete' || e.key === 'Backspace') {
            if (selectedIds.length > 0) {
              if (e.key === 'Backspace') e.preventDefault();
              del();
            }
          } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'j') {
            e.preventDefault(); if (canMergeLines) handleMergeLines(); else if (canMergeZones) handleZoneBoolean('union');
          } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'g') {
            e.preventDefault();
            if (e.shiftKey && canUngroup) handleUngroup();
            else if (!e.shiftKey && canGroup) handleGroup();
          } else if (e.key.toLowerCase() === 's') {
            setSnapEnabled(p => !p);
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [selectedIds, items, clipboard, canMergeLines, canMergeZones, canGroup, canUngroup]);

      return (

          {showToolbar && <Toolbar activeTool={activeTool} setActiveTool={setActiveTool} activeColor={activeColor} setActiveColor={handleColorChange} setMeasurePoints={setMeasurePoints} setMeasureResults={setMeasureResults} customIcons={customIcons} svgInputRef={svgInputRef} saveCustomIconLibrary={saveCustomIconLibrary} importCustomIconLibrary={importCustomIconLibrary} handleFillAction={handleFillAction} t={t} locale={locale} />}
