           for (let i = 0; i < points.length; i++) {

    const DB_STORE = 'project';
    const DB_KEY = 'canvas-state';

    const openProjectDB = () => new Promise((resolve, reject) => {
      if (!window.indexedDB) return reject(new Error('IndexedDB not supported'));
      const request = indexedDB.open(DB_NAME, 1);
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains(DB_STORE)) {
          db.createObjectStore(DB_STORE);
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });

    const saveProjectState = async (data) => {
      try {
        const db = await openProjectDB();
        const tx = db.transaction(DB_STORE, 'readwrite');
        const store = tx.objectStore(DB_STORE);
        store.put(data, DB_KEY);
        await new Promise((resolve, reject) => {
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
          tx.onabort = () => reject(tx.error);
        });
        db.close();
      } catch (err) {
        console.warn('IndexedDB save failed', err);
      }
    };

        const result = await new Promise((resolve, reject) => {
          request.onsuccess = () => resolve(request.result);

        }
      }
      static renderTreeIcon(iconType, color) {

          case 'tree_pine':

          case 'tree_pine_layered': 
            return <g fill={color}><rect x="-1.5" y="8" width="3" height="5" rx="0.5"/><path d="M 0,-13 L -5,-3 L -2,-3 L -7,3 L -3,3 L -9,9 L 9,9 L 3,3 L 7,3 L 2,-3 L 5,-3 Z" /></g>;
          case 'tree_pine_detailed':

          case 'bush': 
            return <g fill={color}><path d="M -11,10 C -12,5 -8,2 -5,3 C -3,-2 3,-2 5,3 C 8,2 12,5 11,10 Z" /></g>;
          case 'tree_group': 
            return <g fill={color}><rect x="2" y="4" width="2" height="7" rx="0.5"/><path d="M 3,-8 C 0,-8 -1,-3 0,0 C -2,3 0,5 3,5 C 6,5 8,3 6,0 C 7,-3 6,-8 3,-8 Z" /><rect x="-4" y="2" width="2.5" height="9" rx="0.5"/><path d="M -3,-13 C -8,-13 -10,-7 -8,-3 C -10,1 -6,4 -3,4 C 0,4 4,1 2,-3 C 4,-7 2,-13 -3,-13 Z" stroke="white" strokeWidth="1.5" /><path d="M -3,-13 C -8,-13 -10,-7 -8,-3 C -10,1 -6,4 -3,4 C 0,4 4,1 2,-3 C 4,-7 2,-13 -3,-13 Z" /></g>;
          case 'tree_outline_round': 
            return <g fill="white" stroke={color} strokeWidth="1.5" strokeLinejoin="round"><path d="M 0,4 L 0,11" fill="none" strokeLinecap="round"/><path d="M -5,4 C -10,4 -12,-1 -8,-4 C -10,-9 -4,-13 0,-13 C 4,-13 10,-9 8,-4 C 12,-1 10,4 5,4 Z" /></g>;
          case 'tree_outline_pine': 
            return <g fill="white" stroke={color} strokeWidth="1.5" strokeLinejoin="round"><path d="M 0,8 L 0,11" fill="none" strokeLinecap="round"/><path d="M 0,-12 L -6,0 L -2,0 L -8,8 L 8,8 L 2,0 L 6,0 Z" /></g>;
          case 'tree_outline_layered': 
            return <g fill="white" stroke={color} strokeWidth="1.5" strokeLinejoin="round"><path d="M 0,9 L 0,11" fill="none" strokeLinecap="round"/><path d="M 0,-13 L -5,-3 L -2,-3 L -7,3 L -3,3 L -9,9 L 9,9 L 3,3 L 7,3 L 2,-3 L 5,-3 Z" /></g>;
          case 'tree_outline_oak': 
            return <g fill="white" stroke={color} strokeWidth="1.5" strokeLinejoin="round"><path d="M 0,6 L 0,11" fill="none" strokeLinecap="round"/><path d="M 0,-14 C -6,-14 -8,-6 -6,0 C -8,4 -4,6 0,6 C 4,6 8,4 6,0 C 8,-6 6,-14 0,-14 Z" /><path d="M 0,-14 L 0,6" fill="none" opacity="0.4" strokeLinecap="round"/></g>;
          case 'tree_outline_bare': 
            return <g fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M 0,11 L 0,-1 M 0,5 L -5,0 M -2,3 L -4,-2 M 0,2 L 5,-3 M 2,0 L 5,2 M 0,-1 L -2,-6 M 0,-1 L 2,-5" /></g>;
          case 'tree_outline_bush': 
            return <g fill="white" stroke={color} strokeWidth="1.5" strokeLinejoin="round"><path d="M -11,10 C -12,5 -8,2 -5,3 C -3,-2 3,-2 5,3 C 8,2 12,5 11,10 Z" /></g>;
          case 'tree_outline_group': 
            return <g fill="white" stroke={color} strokeWidth="1.5" strokeLinejoin="round"><path d="M 3,5 L 3,11 M -3,4 L -3,11" fill="none" strokeLinecap="round" /><path d="M 3,-8 C 0,-8 -1,-3 0,0 C -2,3 0,5 3,5 C 6,5 8,3 6,0 C 7,-3 6,-8 3,-8 Z" /><path d="M -3,-13 C -8,-13 -10,-7 -8,-3 C -10,1 -6,4 -3,4 C 0,4 4,1 2,-3 C 4,-7 2,-13 -3,-13 Z" /></g>;
          default: 
            return <g fill={color}><rect x="-1.5" y="4" width="3" height="8" rx="0.5"/><path d="M -5,4 C -10,4 -12,-1 -8,-4 C -10,-9 -4,-13 0,-13 C 4,-13 10,-9 8,-4 C 12,-1 10,4 5,4 Z" /></g>;
        }
      }
      static renderCompassIcon(iconType, color) {
        switch (iconType) {
          case 'compass_minimal':
            return <g fill="none" stroke={color}><circle cx="0" cy="0" r="12" strokeWidth="2" /><line x1="0" y1="0" x2="0" y2="-12" strokeWidth="4" /></g>;
          case 'compass_crosshair':
            return <g fill="none" stroke={color}><circle cx="0" cy="0" r="10" strokeWidth="1" /><line x1="-14" y1="0" x2="14" y2="0" strokeWidth="1" /><line x1="0" y1="14" x2="0" y2="0" strokeWidth="1" /><line x1="0" y1="0" x2="0" y2="-12" strokeWidth="3" /></g>;
          case 'compass_architectural':
            return <g fill="none" stroke={color}><circle cx="0" cy="0" r="11" strokeWidth="1" /><line x1="-11" y1="0" x2="11" y2="0" strokeWidth="1" /><line x1="0" y1="0" x2="0" y2="11" strokeWidth="1" /><line x1="0" y1="-11" x2="0" y2="0" strokeWidth="2.5" /></g>;
          case 'compass_solid_half':
            return <g fill={color}><circle cx="0" cy="0" r="12" /><rect x="-1" y="-12" width="2" height="12" fill="white" /></g>;
          case 'compass_solid_arrow':
            return <g fill={color}><circle cx="0" cy="0" r="12" /><path d="M 0,-9 L 6,6 L 0,2 L -6,6 Z" fill="white" strokeLinejoin="round" /></g>;
          case 'compass_classic': default:
            return <g fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"><circle cx="0" cy="3" r="11" /><path d="M 0,-4 L 5,9 L 0,6 L -5,9 Z" /><path d="M -3,-12 L -3,-17 L 3,-12 L 3,-17" /></g>;
        }
      }
      static renderLocationPin(iconType, color) {
        switch (iconType) {
          case 'pin_outline':
            return (
              <g fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round">
                <path d="M 0,8 C -8,-2 -8,-8 -8,-11 C -8,-15.4 -4.4,-19 0,-19 C 4.4,-19 8,-15.4 8,-11 C 8,-8 8,-2 0,8 Z" />
                <circle cx="0" cy="-11" r="3" />
                <ellipse cx="0" cy="11" rx="6" ry="2" />
              </g>
            );
          case 'pin_solid': default:
            return (
              <g fill={color}>
                <path d="M 0,8 C -8,-2 -8,-8 -8,-11 C -8,-15.4 -4.4,-19 0,-19 C 4.4,-19 8,-15.4 8,-11 C 8,-8 8,-2 0,8 Z" />
                <circle cx="0" cy="-11" r="3" fill="white" />
                <ellipse cx="0" cy="11" rx="6" ry="2" fill="none" stroke={color} strokeWidth="1.5" />
              </g>
            );
        }
      }
      static renderScaleBar(iconType, color, label) {
        let graphics;
        switch(iconType) {
          case 'scale_4div':
            graphics = (
              <g>
                <rect x="-50" y="-2" width="25" height="4" fill={color} stroke={color} strokeWidth="1"/>
                <rect x="-25" y="-2" width="25" height="4" fill="white" stroke={color} strokeWidth="1"/>
                <rect x="0" y="-2" width="25" height="4" fill={color} stroke={color} strokeWidth="1"/>
                <rect x="25" y="-2" width="25" height="4" fill="white" stroke={color} strokeWidth="1"/>
                <line x1="-50" y1="-5" x2="-50" y2="2" stroke={color} strokeWidth="1.5" />
                <line x1="-25" y1="-5" x2="-25" y2="2" stroke={color} strokeWidth="1.5" />
                <line x1="0" y1="-5" x2="0" y2="2" stroke={color} strokeWidth="1.5" />
                <line x1="25" y1="-5" x2="25" y2="2" stroke={color} strokeWidth="1.5" />
                <line x1="50" y1="-5" x2="50" y2="2" stroke={color} strokeWidth="1.5" />
              </g>
            );
            break;
          case 'scale_2div':
            graphics = (
              <g>
                <rect x="-50" y="-2" width="50" height="4" fill={color} stroke={color} strokeWidth="1"/>
                <rect x="0" y="-2" width="50" height="4" fill="white" stroke={color} strokeWidth="1"/>
                <line x1="-50" y1="-5" x2="-50" y2="2" stroke={color} strokeWidth="1.5" />
                <line x1="0" y1="-5" x2="0" y2="2" stroke={color} strokeWidth="1.5" />
                <line x1="50" y1="-5" x2="50" y2="2" stroke={color} strokeWidth="1.5" />
              </g>
            );
            break;
          case 'scale_double':
            graphics = (
              <g>
                <rect x="-50" y="-4" width="50" height="4" fill={color} stroke={color} strokeWidth="1"/>
                <rect x="0" y="-4" width="50" height="4" fill="white" stroke={color} strokeWidth="1"/>
                <rect x="-50" y="0" width="50" height="4" fill="white" stroke={color} strokeWidth="1"/>
                <rect x="0" y="0" width="50" height="4" fill={color} stroke={color} strokeWidth="1"/>
                <line x1="-50" y1="-7" x2="-50" y2="4" stroke={color} strokeWidth="1.5" />
                <line x1="0" y1="-7" x2="0" y2="4" stroke={color} strokeWidth="1.5" />
                <line x1="50" y1="-7" x2="50" y2="4" stroke={color} strokeWidth="1.5" />
              </g>
            );
            break;
          case 'scale_line': default:
            graphics = (
              <g>
                <line x1="-50" y1="0" x2="50" y2="0" stroke={color} strokeWidth="2" />
                <line x1="-50" y1="-4" x2="-50" y2="4" stroke={color} strokeWidth="2" />
                <line x1="-25" y1="-3" x2="-25" y2="3" stroke={color} strokeWidth="1.5" />
                <line x1="0" y1="-4" x2="0" y2="4" stroke={color} strokeWidth="2" />
                <line x1="25" y1="-3" x2="25" y2="3" stroke={color} strokeWidth="1.5" />
                <line x1="50" y1="-4" x2="50" y2="4" stroke={color} strokeWidth="2" />
              </g>
            );
            break;
        }
        return (
          <g>
            {graphics}
            {label && <text x="0" y="14" fontSize="8" fontWeight="bold" fill={color} textAnchor="middle" xmlSpace="preserve">{label}</text>}
          </g>
        );
      }
      static getFillUrl(color, pattern) {
        return (!pattern || pattern === 'solid') ? color : `url(#pat-${pattern}-${color.replace('#', '')})`;
      }
    }

    const ToolBtn = ({ icon: Icon, langLabel, shortcut, active, onClick, iconClass, fillIcon, dashIcon }) => (
      <button onClick={onClick} className={`relative group w-10 h-10 rounded-lg flex items-center justify-center transition-all ${active ? 'bg-gray-900 text-white shadow-md' : 'text-gray-400 hover:bg-gray-100 hover:text-gray-900'}`} title={shortcut ? `${langLabel} (${shortcut})` : langLabel}>
        <Icon size={18} className={iconClass} strokeDasharray={dashIcon ? '3 3' : undefined} fill={fillIcon ? 'currentColor' : 'none'} opacity={fillIcon ? 1 : 1} />
        <span className="absolute left-14 bg-gray-900 text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none z-50 shadow-xl font-bold uppercase tracking-wider flex items-center gap-1.5">
          {langLabel} {shortcut && <span className="bg-gray-700 text-gray-300 px-1 py-0.5 rounded text-[8px] font-mono leading-none tracking-tighter">{shortcut}</span>}
        </span>
      </button>
    );

    const ToolBtnWithMenu = ({ icon: Icon, label, options, active, setActiveTool, setMeasurePoints, setMeasureResults }) => {
      const [isOpen, setIsOpen] = useState(false);
      const currentOption = options.find(opt => opt.tool === active);
      
      return (
        <div className="relative w-10 flex flex-col items-center">
          <button 
            onClick={() => setIsOpen(!isOpen)} 
            className={`relative group w-10 h-10 rounded-lg flex items-center justify-center transition-all ${active && options.map(o=>o.tool).includes(active) ? 'bg-gray-900 text-white shadow-md' : 'text-gray-400 hover:bg-gray-100 hover:text-gray-900'}`}
          >
            <Icon size={18} className={currentOption?.iconClass || ''} />
            <span className="absolute left-14 bg-gray-900 text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none z-50 shadow-xl font-bold uppercase tracking-wider">
              {currentOption?.label || label}
            </span>
          </button>
          
          {isOpen && (
            <div className="absolute top-12 left-0 bg-white border border-gray-200 rounded-lg shadow-lg flex flex-col p-1 z-50 min-w-max">
              {options.map(option => (
                <button
                  key={option.tool}
                  onClick={() => {
                    setActiveTool(option.tool);
                    if (option.tool === 'measure') {
                      setMeasurePoints([]);
                      setMeasureResults([]);
                    }
                    setIsOpen(false);
                  }}
                  className={`px-3 py-1.5 text-left text-xs font-semibold rounded hover:bg-gray-100 whitespace-nowrap flex items-center gap-2 ${
                    active === option.tool ? 'bg-gray-200 text-gray-900' : 'text-gray-700'
                  }`}
                  title={option.shortcut}
                >
                  {option.label}
                  {option.shortcut && <span className="text-[8px] bg-gray-100 px-1 py-0.5 rounded ml-auto">{option.shortcut}</span>}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    };

    const Toolbar = ({ activeTool, setActiveTool, activeColor, setActiveColor, setMeasurePoints, setMeasureResults, customIcons, svgInputRef, saveCustomIconLibrary, importCustomIconLibrary, handleFillAction, t, locale }) => (
      <div className="w-16 bg-white border-r border-gray-200 flex flex-col items-center py-4 z-20 shrink-0 shadow-sm overflow-y-auto" style={{ scrollbarWidth: 'none' }}>
        <div className="bg-gray-900 text-white w-10 h-10 flex items-center justify-center rounded-xl mb-4 shadow-lg shrink-0"><span className="font-black text-xs">AP</span></div>
        <div className="space-y-1 w-full px-2 flex flex-col items-center">
          <ToolBtn icon={Lucide.Hand} langLabel={t('pan')} shortcut="Shift+H" active={activeTool === 'pan'} onClick={() => setActiveTool('pan')} />
          <ToolBtn icon={Lucide.MousePointer2} langLabel={t('select')} shortcut="Shift+V" active={activeTool === 'select'} onClick={() => setActiveTool('select')} />
          <ToolBtn icon={Lucide.Shapes} langLabel={t('icon')} shortcut="Shift+S" active={activeTool === 'icon_element'} onClick={() => setActiveTool('icon_element')} />
          <ToolBtnWithMenu 
            icon={Lucide.Ruler} 
            label={t('measureAndGuides')}
            options={[
              { tool: 'guide_h', label: t('measureHorizontal'), shortcut: 'Shift+X', iconClass: '' },
              { tool: 'guide_v', label: t('measureVertical'), shortcut: 'Shift+Y', iconClass: 'rotate-90' },
              { tool: 'measure', label: t('measure'), shortcut: 'Shift+U', iconClass: '' }
            ]}
            active={activeTool}
            setActiveTool={setActiveTool}
            setMeasurePoints={setMeasurePoints}
            setMeasureResults={setMeasureResults}
          />
          <div className="w-8 h-px bg-gray-100 my-1" />
          <ToolBtn icon={Lucide.ArrowRight} langLabel={t('arrow')} shortcut="Shift+A" active={activeTool === 'arrow'} onClick={() => setActiveTool('arrow')} />
          <ToolBtn icon={Lucide.CornerDownRight} langLabel={t('curveArrow')} shortcut="Shift+C" active={activeTool === 'curve_arrow'} onClick={() => setActiveTool('curve_arrow')} />
          <ToolBtn icon={Lucide.PenTool} langLabel={t('labelSpline')} shortcut="Shift+P" active={activeTool === 'spline'} onClick={() => setActiveTool('spline')} />
          <ToolBtn icon={Lucide.Minus} langLabel={t('solidLine')} shortcut="Shift+D" active={activeTool === 'solid_line'} onClick={() => setActiveTool('solid_line')} />
          <ToolBtn icon={Lucide.Minus} langLabel={t('dashedLine')} shortcut="Shift+W" active={activeTool === 'dashed_line'} onClick={() => setActiveTool('dashed_line')} iconClass="opacity-50" />
          <ToolBtn icon={Lucide.Square} langLabel={t('zone')} shortcut="Shift+Z" active={activeTool === 'zone'} onClick={() => setActiveTool('zone')} />
          <ToolBtn icon={Lucide.Circle} langLabel={t('circleZone')} shortcut="Shift+J" active={activeTool === 'circle_zone'} onClick={() => setActiveTool('circle_zone')} iconClass="fill-current opacity-50" />
          <ToolBtn icon={Lucide.Circle} langLabel={t('highlight')} shortcut="Shift+O" active={activeTool === 'highlight'} onClick={() => setActiveTool('highlight')} />
          <ToolBtn icon={Lucide.Route} langLabel={t('road')} shortcut="Shift+R" active={activeTool === 'road'} onClick={() => setActiveTool('road')} />
          <ToolBtn icon={Lucide.Circle} langLabel={t('node')} shortcut="Shift+N" active={activeTool === 'node'} onClick={() => setActiveTool('node')} fillIcon />
          <ToolBtn icon={Lucide.Play} langLabel={t('marker')} shortcut="Shift+M" active={activeTool === 'triangle_marker'} onClick={() => setActiveTool('triangle_marker')} fillIcon />
          <button onClick={handleFillAction} className="relative group w-10 h-10 rounded-lg flex items-center justify-center transition-all text-gray-400 hover:bg-gray-100 hover:text-gray-900" title={t('smartFill')}>
            <Lucide.Sparkles size={18} />
            <span className="absolute left-14 bg-gray-900 text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none z-50 shadow-xl font-bold uppercase tracking-wider">
              {t('smartFill')}
            </span>
          </button>
          <ToolBtn icon={Lucide.Type} langLabel={t('text')} shortcut="Shift+T" active={activeTool === 'text'} onClick={() => setActiveTool('text')} />
          <ToolBtn icon={Lucide.MessageSquare} langLabel={t('leaderText')} shortcut="Shift+L" active={activeTool === 'leader_text'} onClick={() => setActiveTool('leader_text')} />
          <div className="w-8 h-px bg-gray-100 my-2" />
          <button onClick={() => setActiveTool('icon_library')} className={`relative w-10 h-10 rounded-lg flex items-center justify-center transition-all ${activeTool === 'icon_library' ? 'bg-gray-900 text-white shadow-md' : 'text-gray-400 hover:bg-gray-100 hover:text-gray-900'}`} title={t('iconLibraryTitle')}>
            <Lucide.Palette size={18} />
            {Object.keys(customIcons).length > 0 && <span className="absolute top-0 right-0 bg-blue-600 text-white rounded-full w-4 h-4 flex items-center justify-center text-[10px] font-bold">{Object.keys(customIcons).length}</span>}
            <span className="absolute left-14 bg-gray-900 text-white text-[10px] px-2 py-1 rounded opacity-0 hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none z-50 shadow-xl font-bold uppercase tracking-wider">{t('iconLibrary')}</span>
          </button>
        </div>
        <div className="mt-auto flex flex-col items-center gap-2 p-2 w-full pt-4 shrink-0">
          <div className="grid grid-cols-2 gap-1 w-full">
            {COLORS.map(c => <button key={c} className={`w-5 h-5 rounded-full border border-gray-200 ${activeColor === c ? 'ring-2 ring-gray-800' : ''}`} style={{backgroundColor:c}} onClick={()=>setActiveColor(c)}/>)}
          </div>
          <div className="relative w-full h-6 rounded border border-gray-300 overflow-hidden cursor-pointer" title={t('customColorTitle')}>
            <input type="color" value={activeColor.length === 7 ? activeColor : '#000000'} onChange={(e)=>setActiveColor(e.target.value)} className="absolute -top-2 -left-2 w-16 h-16 cursor-pointer"/>
          </div>
        </div>
      </div>
    );
    
    const HistBtn = ({ i: I, a, c, l }) => <button onClick={c} disabled={!a} className={`p-1.5 rounded transition-all ${a ? 'text-gray-700 hover:bg-white hover:shadow-sm' : 'text-gray-300 opacity-40 cursor-not-allowed'}`} title={l}><I size={14}/></button>;
    const HdrBtn = ({ i: I, t, c, p }) => <button onClick={c} className={`flex items-center space-x-1.5 px-3 py-1.5 rounded-md text-xs font-semibold transition-all ${p ? 'bg-gray-900 text-white shadow-sm hover:bg-black' : 'bg-white text-gray-700 border border-gray-200 hover:bg-gray-50'}`}><I size={14}/> <span>{t}</span></button>;

    const Topbar = ({ snapEnabled, setSnapEnabled, isSketchMode, setIsSketchMode, gridType, setGridType, canUndo, canRedo, undo, redo, snapshots, saveSnapshot, loadSnapshot, handleMergeLines, handleZoneBoolean, handleSmartFill, handleFillClosedArea, generateLegend, exportSVG, exportPNG, exportDXF, exportPDF, selectedIds = [], setItems, commitHistory, canMergeLines, canMergeZones, onImportBg, onImportImageItem, clearBackground, bgImage, zoom, setZoom, setPan, canGroup, canUngroup, handleGroup, handleUngroup, handleAlign, canDistribute, handleDistribute, handleMirror, svgInputRef, saveCustomIconLibrary, importCustomIconLibrary, customIcons, setActiveTool, showRightPanel, setShowRightPanel, showToolbar = true, toggleToolbar = () => {}, topbarStage = 0, t, locale, setLocale, onNewFile }) => {
      const [importMenuOpen, setImportMenuOpen] = useState(false);
      const [exportMenuOpen, setExportMenuOpen] = useState(false);
      return (
      <div className="bg-white border-b border-gray-200 flex flex-col z-10 shrink-0">
        <div className="h-10 flex items-center justify-between px-4 py-1 border-b border-gray-100">
          <div className="flex items-center space-x-2 overflow-x-auto no-scrollbar">
            <div className="flex bg-gray-50 rounded-lg p-0.5 border border-gray-200 shadow-sm shrink-0">
              <HistBtn i={Lucide.Undo} a={canUndo} c={undo} l={t('undo')}/>
              <HistBtn i={Lucide.Redo} a={canRedo} c={redo} l={t('redo')}/>
            </div>
            <button onClick={onNewFile} className="p-1.5 rounded-md text-gray-700 bg-white border border-gray-200 hover:bg-gray-50 transition" title={t('newFile')}>
              <Lucide.FilePlus size={16}/>
            </button>
            <div className="w-px h-4 bg-gray-200 shrink-0" />
            <div className="flex bg-gray-50 rounded-lg p-0.5 border border-gray-200 shadow-sm items-center shrink-0">
               <button onClick={()=>setZoom(z=>Math.max(0.1, z-0.1))} className="p-1 hover:bg-white rounded text-gray-700" title={t('zoomOut')}><Lucide.ZoomOut size={14}/></button>
               <span className="text-[10px] font-bold px-1 w-9 text-center text-gray-700">{Math.round(zoom*100)}%</span>
               <button onClick={()=>setZoom(z=>Math.min(5, z+0.1))} className="p-1 hover:bg-white rounded text-gray-700" title={t('zoomIn')}><Lucide.ZoomIn size={14}/></button>
               <button onClick={()=>{setZoom(1); setPan({x:0,y:0});}} className="p-1 hover:bg-white rounded ml-0.5 text-gray-700" title={t('resetView')}><Lucide.Maximize size={14}/></button>
            </div>
            <div className="w-px h-4 bg-gray-200 shrink-0" />
            
            <div className="flex bg-gray-50 rounded-lg p-0.5 border border-gray-200 shadow-sm items-center text-xs shrink-0">
              <button onClick={()=>setGridType('none')} className={`px-2 py-1 rounded text-gray-600 font-semibold transition-all ${gridType==='none'?'bg-white shadow':''}`} title={t('noBackground')}>{t('noBackground')}</button>
              <button onClick={()=>setGridType('dots')} className={`px-2 py-1 rounded text-gray-600 transition-all ${gridType==='dots'?'bg-white shadow text-blue-600':''}`} title={t('dots')}><Lucide.Grip size={14}/></button>
              <button onClick={()=>setGridType('square')} className={`px-2 py-1 rounded text-gray-600 transition-all ${gridType==='square'?'bg-white shadow text-blue-600':''}`} title={t('grid')}><Lucide.Grid size={14}/></button>
              <button onClick={()=>setGridType('iso')} className={`px-2 py-1 rounded text-gray-600 transition-all ${gridType==='iso'?'bg-white shadow text-blue-600':''}`} title={t('iso')}><Lucide.Hexagon size={14}/></button>
            </div>
            <div className="flex items-center rounded-lg border border-gray-200 bg-gray-50 shadow-sm p-0.5 shrink-0">
              <button onClick={saveSnapshot} className="flex items-center space-x-1 px-2 py-1 text-xs font-semibold rounded text-gray-700 hover:bg-white" title={t('saveSnapshot')}><Lucide.Bookmark size={13}/><span className="hidden lg:inline">{t('saveSnapshot')}</span></button>
              {snapshots.length > 0 && (
                <select defaultValue="" onChange={e => { if (!e.target.value) return; loadSnapshot(e.target.value); e.target.value = ''; }} className="text-[10px] bg-white border border-gray-200 rounded ml-1 px-2 py-1" title={t('loadSnapshot')}>
                  <option value="">{t('loadSnapshot')}</option>
                  {snapshots.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}

              )}
            </div>
            <button onClick={()=>setSnapEnabled(!snapEnabled)} className={`flex items-center space-x-1 px-2.5 py-1 rounded-md text-xs font-semibold transition-all shrink-0 ${snapEnabled ? 'bg-gray-900 text-white shadow-md' : 'bg-white text-gray-400 border border-gray-200 hover:bg-gray-50'}`} title={t('snap')}><Lucide.Magnet size={13}/><span className="hidden lg:inline text-[10px]">{t('snap')}</span></button>

            <button onClick={()=>setIsSketchMode(!isSketchMode)} className={`flex items-center space-x-1 px-2.5 py-1 rounded-md text-xs font-semibold transition-all shrink-0 ${isSketchMode ? 'bg-purple-600 text-white shadow-md' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}`} title={`${t('sketch')} (Shift+K)`}><Lucide.Pencil size={13}/><span className="hidden lg:inline text-[10px]">{t('sketch')}</span></button>
          </div>
          <div className="flex items-center space-x-2 shrink-0">
            <div className="relative">
              <button onClick={() => setImportMenuOpen(prev => !prev)} className="flex items-center space-x-1.5 px-3 py-1.5 rounded-md text-xs font-semibold transition-all bg-white text-gray-700 border border-gray-200 hover:bg-gray-50">
                <Lucide.ImageIcon size={14}/>
                <span>{t('background')}</span>
                <Lucide.ChevronDown size={12}/>
              </button>
              {importMenuOpen && (
                <div className="absolute left-0 mt-1 w-40 rounded-xl border border-gray-200 bg-white shadow-lg overflow-hidden z-50">
                  <button onClick={() => { onImportBg(); setImportMenuOpen(false); }} className="w-full text-left px-3 py-2 text-sm text-gray-700 hover:bg-gray-50">{t('background')}</button>
                  <button onClick={() => { onImportImageItem(); setImportMenuOpen(false); }} className="w-full text-left px-3 py-2 text-sm text-gray-700 hover:bg-gray-50">{t('pasteImage')}</button>
                </div>
              )}
            </div>
            {bgImage && <HdrBtn i={Lucide.Trash2} t={t('clearBackground')} c={clearBackground} />}
            <HdrBtn i={Lucide.List} t={t('legend')} c={generateLegend}/>
            <div className="relative">
              <button type="button" onClick={() => setExportMenuOpen(prev => !prev)} className="flex items-center space-x-1.5 px-3 py-1.5 rounded-md text-xs font-semibold transition-all bg-white text-gray-700 border border-gray-200 hover:bg-gray-50">
                <Lucide.Download size={14}/>
                <span>{t('download')}</span>
                <Lucide.ChevronDown size={12}/>
              </button>
              {exportMenuOpen && (
                <div className="absolute left-0 mt-1 w-40 rounded-xl border border-gray-200 bg-white shadow-lg overflow-hidden z-50">
                  <button type="button" onClick={() => { exportSVG(); setExportMenuOpen(false); }} className="w-full text-left px-3 py-2 text-sm text-gray-700 hover:bg-gray-50">{t('svg')}</button>
                  <button type="button" onClick={() => { exportPNG(); setExportMenuOpen(false); }} className="w-full text-left px-3 py-2 text-sm text-gray-700 hover:bg-gray-50">{t('png')}</button>
                  <button type="button" onClick={() => { exportDXF(); setExportMenuOpen(false); }} className="w-full text-left px-3 py-2 text-sm text-gray-700 hover:bg-gray-50">{t('dxf')}</button>
                  <button type="button" onClick={() => { exportPDF(); setExportMenuOpen(false); }} className="w-full text-left px-3 py-2 text-sm text-gray-700 hover:bg-gray-50">{t('pdf')}</button>
                </div>
              )}
            </div>
            <div className="w-px h-4 bg-gray-200 shrink-0" />
            <button onClick={() => setActiveTool('icon_library')} className={`flex items-center space-x-1 px-2.5 py-1 rounded-md text-xs font-semibold transition-all ${Object.keys(customIcons).length > 0 ? 'bg-blue-100 text-blue-700 border border-blue-300 hover:bg-blue-200' : 'bg-white text-gray-700 border border-gray-200 hover:bg-gray-50'}`} title={t('iconLibraryTitle')}>
              <Lucide.Palette size={13}/>
              <span className="hidden lg:inline">{t('iconLibrary')}</span>
              {Object.keys(customIcons).length > 0 && <span className="bg-blue-600 text-white rounded-full w-4 h-4 flex items-center justify-center text-[8px] font-bold">{Object.keys(customIcons).length}</span>}
            </button>
            <button onClick={()=>{setItems(prev=>prev.filter(i=>!selectedIds.includes(i.id))); if(commitHistory)commitHistory();}} disabled={selectedIds.length===0} className={`p-1 rounded-md transition-colors ${selectedIds.length>0 ? 'text-gray-500 hover:bg-red-50 hover:text-red-600' : 'text-gray-300 cursor-not-allowed'}`}><Lucide.Trash2 size={16}/></button>
            <button onClick={() => toggleToolbar()} className={`p-1 rounded-md transition-colors ${showToolbar ? 'text-gray-700 hover:bg-gray-100' : 'text-gray-400 hover:bg-gray-100'}`} title={t('toggleToolbar')}>
              {showToolbar ? <Lucide.ChevronsLeft size={16}/> : <Lucide.ChevronsRight size={16}/>}
            </button>
            <button onClick={() => setShowRightPanel(!showRightPanel)} className={`p-1 rounded-md transition-colors ${showRightPanel ? 'text-gray-700 hover:bg-gray-100' : 'text-gray-400 hover:bg-gray-100'}`} title={t('toggleSidebar')}><Lucide.PanelRightOpen size={16}/></button>
            <div className="w-px h-4 bg-gray-200 shrink-0" />
            <div className="flex items-center space-x-1">
              <button type="button" onClick={() => {
                const order = ['zh','en','ja'];
                const idx = order.indexOf(locale);
                setLocale(order[(idx + 1) % order.length]);
              }} className={`w-10 h-8 rounded-full text-[10px] font-bold transition ${locale ? 'bg-gray-900 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`} title={t('language')}>
                {LOCALE_LABELS[locale] || locale}
              </button>
            </div>
            <div className="flex items-center space-x-1 pl-1 select-none text-[10px]"><span className="text-gray-900 font-black tracking-tight">ANALYTICAL</span><span className="bg-blue-600 text-white px-1 py-0.5 rounded text-[7px] font-black tracking-widest">PLANNER</span></div>
          </div>
        </div>
        
        {topbarStage === 0 && (
          <div className="h-10 flex items-center justify-between px-4 py-1">
            <div className="flex items-center space-x-2 overflow-x-auto no-scrollbar">
              {canGroup && (
                <>
                  <div className="flex bg-gray-50 rounded-lg p-0.5 border border-gray-200 shadow-sm items-center shrink-0">
                    <HistBtn i={Lucide.AlignLeft} a={true} c={()=>handleAlign('left')} l={t('alignLeft')}/>
                    <HistBtn i={Lucide.AlignCenter} a={true} c={()=>handleAlign('center')} l={t('alignCenter')}/>
                    <HistBtn i={Lucide.AlignRight} a={true} c={()=>handleAlign('right')} l={t('alignRight')}/>
                    <div className="w-px h-3 bg-gray-300 mx-1" />
                    <HistBtn i={Lucide.ArrowUpToLine} a={true} c={()=>handleAlign('top')} l={t('alignTop')}/>
                    <HistBtn i={Lucide.ArrowDownToLine} a={true} c={()=>handleAlign('bottom')} l={t('alignBottom')}/>
                  </div>
                  <div className="w-px h-4 bg-gray-200 shrink-0"/>
                  <HdrBtn i={Lucide.Package} t={t('group')} c={handleGroup}/>
                </>
              )}
              {canUngroup && <HdrBtn i={Lucide.PackageOpen} t={t('ungroup')} c={handleUngroup}/>}
              
              {canDistribute && (
                <>
                  <div className="w-px h-4 bg-gray-200 shrink-0"/>
                  <div className="flex bg-gray-50 rounded-lg p-0.5 border border-gray-200 shadow-sm items-center shrink-0">
                     <HistBtn i={Lucide.MoveHorizontal} a={true} c={()=>handleDistribute('h')} l={t('moveHorizontal')}/>
                     <HistBtn i={Lucide.MoveVertical} a={true} c={()=>handleDistribute('v')} l={t('moveVertical')}/>
                  </div>
                </>
              )}
              {selectedIds.length > 0 && (
                <>
                  <div className="w-px h-4 bg-gray-200 shrink-0"/>
                  <div className="flex bg-gray-50 rounded-lg p-0.5 border border-gray-200 shadow-sm items-center shrink-0">
                     <HistBtn i={Lucide.ArrowLeftRight} a={true} c={()=>handleMirror('h')} l={t('mirrorHorizontal')}/>
                     <HistBtn i={Lucide.ArrowUpDown} a={true} c={()=>handleMirror('v')} l={t('mirrorVertical')}/>
                  </div>
                </>
              )}

              {canMergeLines && <><div className="w-px h-4 bg-gray-200 shrink-0"/><HdrBtn i={Lucide.Link} t={t('merge')} c={handleMergeLines}/></>}
              {canMergeZones && (
                <>
                  <div className="w-px h-4 bg-gray-200 shrink-0"/>
                  <div className="flex bg-white rounded-md border border-gray-200 shadow-sm overflow-hidden text-xs font-semibold shrink-0">
                    <button onClick={()=>{console.log('聯集操作，選中:', selectedIds.length, '個zone'); handleZoneBoolean('union');}} className="px-3 py-1 text-gray-700 hover:bg-blue-50 hover:text-blue-700 active:bg-blue-200 border-r border-gray-200 flex items-center gap-1 transition-colors" title={t('unionTitle')}>
                      <svg width="14" height="14" viewBox="0 0 24 24"><path d="M4 4 H15 V9 H20 V20 H9 V15 H4 Z" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" /></svg>
                      <span className="hidden lg:inline text-[10px]">{t('union')}</span>
                    </button>
                    <button onClick={()=>{console.log('交集操作，選中:', selectedIds.length, '個zone'); handleZoneBoolean('intersection');}} className="px-3 py-1 text-gray-700 hover:bg-green-50 hover:text-green-700 active:bg-green-200 border-r border-gray-200 flex items-center gap-1 transition-colors" title={t('intersectionTitle')}>
                      <svg width="14" height="14" viewBox="0 0 24 24"><rect x="4" y="4" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" /><rect x="9" y="9" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" /><rect x="9" y="9" width="6" height="6" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" /></svg>
                      <span className="hidden lg:inline text-[10px]">{t('intersection')}</span>
                    </button>
                    <button onClick={()=>{console.log('差集操作，選中:', selectedIds.length, '個zone'); handleZoneBoolean('difference');}} className="px-3 py-1 text-gray-700 hover:bg-orange-50 hover:text-orange-700 active:bg-orange-200 flex items-center gap-1 transition-colors" title={t('differenceTitle')}>
                      <svg width="14" height="14" viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" /><path d="M4 4 H15 V9 H9 V15 H4 Z" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" /></svg>
                      <span className="hidden lg:inline text-[10px]">{t('difference')}</span>
                    </button>
                  </div>
                </>
              )}
            </div>
          </div>
        )}
      </div>
    );
  };

    const LayerPanel = ({ layers, setLayers, activeLayerId, setActiveLayerId, setItems, commitHistory, t }) => {
      const [edId, setEdId] = useState(null);
      const [dragId, setDragId] = useState(null);
      const [dragOverId, setDragOverId] = useState(null);
      
      const add = () => { const id = `l-${Date.now()}`; setLayers([{ id, name: `${t('newLayer')} ${layers.filter(l => !l.isFolder).length + 1}`, visible: true, locked: false, faded: false, isFolder: false, blendMode: 'normal' }, ...layers]); setActiveLayerId(id); };
      const addFolder = () => { const id = `f-${Date.now()}`; setLayers([{ id, name: `${t('newFolder')} ${layers.filter(l => l.isFolder).length + 1}`, visible: true, locked: false, faded: false, isFolder: true, expanded: true, blendMode: 'normal' }, ...layers]); };
      
      const togV = (id, e) => { e.stopPropagation(); setLayers(layers.map(l => l.id === id ? { ...l, visible: !l.visible } : l)); };
      const togL = (id, e) => { e.stopPropagation(); setLayers(layers.map(l => l.id === id ? { ...l, locked: !l.locked } : l)); };
      const togF = (id, e) => { e.stopPropagation(); setLayers(layers.map(l => l.id === id ? { ...l, faded: !l.faded } : l)); };
      const togExp = (id, e) => { e.stopPropagation(); setLayers(layers.map(l => l.id === id && l.isFolder ? { ...l, expanded: !l.expanded } : l)); };
      
      const handleDragStart = (e, layerId) => {
        setDragId(layerId);
        e.dataTransfer.effectAllowed = 'move';
      };
      
      const handleDragOver = (e, folderId) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        setDragOverId(folderId);
      };
      
      const handleDragLeave = () => {
        setDragOverId(null);
      };
      
      const handleDrop = (e, folderId) => {
        e.preventDefault();
        if (!dragId || dragId === folderId) return;
        
        const folder = layers.find(l => l.id === folderId);
        if (!folder?.isFolder) return;
        
        setDragOverId(null);
        
        // 移動圖層到資料夾
        const movedLayer = layers.find(l => l.id === dragId);
        if (movedLayer?.isFolder) return; // 資料夾不能放入資料夾
        
        const newLayers = layers
          .filter(l => l.id !== dragId)
          .map(l => l.id === folderId ? { ...l, expanded: true } : l);
        
        // 在資料夾後面插入圖層
        const folderIdx = newLayers.findIndex(l => l.id === folderId);
        newLayers.splice(folderIdx + 1, 0, { ...movedLayer, parentId: folderId });
        
        setLayers(newLayers);
        setDragId(null);
        if (commitHistory) commitHistory();
      };
      
      const handleDragEnd = () => {
        setDragId(null);
        setDragOverId(null);
      };
      
      const mv = (idx, dir, e) => {
         e.stopPropagation();
         if ((dir === -1 && idx === 0) || (dir === 1 && idx === layers.length - 1)) return;
         const nl = [...layers];
         [nl[idx], nl[idx + dir]] = [nl[idx + dir], nl[idx]];
         setLayers(nl);
         if (commitHistory) commitHistory();
      };
      
      const del = (id, e) => {
        e.stopPropagation();
        if (layers.length === 1) return alert(t('atLeastOneLayer'));
        const folder = layers.find(l => l.id === id);
        if (folder?.isFolder) {
          if (confirm(t('confirmDeleteFolder'))) {
            setLayers(layers.filter(l => l.id !== id));
            if (commitHistory) commitHistory();
          }
        } else {
          if (confirm(t('confirmDeleteLayer'))) {
            setItems(p => p.filter(i => (i.layerId || layers[0].id) !== id));
            setLayers(layers.filter(l => l.id !== id));
            if (activeLayerId === id) setActiveLayerId(layers.filter(l => l.id !== id)[0].id);
            if (commitHistory) commitHistory();
          }
        }
      };
      
      const ren = (id, n) => setLayers(layers.map(l => l.id === id ? { ...l, name: n } : l));
      
      // 根據層級關係重新組織圖層顯示
      const renderLayers = (parentLayers = layers.filter(l => !l.parentId)) => {
        return parentLayers.map((l, idx) => {
          const childLayers = layers.filter(layer => layer.parentId === l.id);
          return (
            <div key={l.id}>
              <div
                draggable={!l.isFolder}
                onDragStart={(e) => handleDragStart(e, l.id)}
                onDragEnd={handleDragEnd}
                onDragOver={(e) => l.isFolder && handleDragOver(e, l.id)}
                onDragLeave={handleDragLeave}
                onDrop={(e) => l.isFolder && handleDrop(e, l.id)}
                className={`flex items-center justify-between p-2 rounded-lg cursor-pointer transition-all ${l.isFolder ? 'bg-blue-50 border-blue-100' : activeLayerId===l.id?'bg-gray-100 border-gray-200 shadow-sm':'hover:bg-gray-50 border-transparent'} border text-sm ${dragOverId === l.id ? 'ring-2 ring-blue-400' : ''} ${dragId === l.id ? 'opacity-50' : ''} ${!l.isFolder ? 'cursor-grab active:cursor-grabbing' : ''}`}
                onClick={()=>!l.isFolder && setActiveLayerId(l.id)}
              >
                 <div className="flex items-center flex-1">
                   {l.isFolder && <button onClick={(e)=>togExp(l.id, e)} className="p-0 hover:bg-blue-100 rounded mr-1"><Lucide.ChevronDown size={16} className={`transition-transform ${l.expanded ? '' : '-rotate-90'}`}/></button>}
                   {!l.isFolder && l.parentId && <div className="w-4" />}
                   {edId === l.id ? <input autoFocus type="text" value={l.name} onChange={e=>ren(l.id, e.target.value)} onBlur={()=>setEdId(null)} onKeyDown={e=>{if(e.key==='Enter')setEdId(null)}} className="flex-1 w-20 bg-white border border-gray-300 rounded px-1 outline-none text-xs mr-2" /> : <span className="truncate flex-1" onDoubleClick={()=>setEdId(l.id)} title={t('editNameHint')} style={{fontWeight: l.isFolder ? 600 : 400, color: l.isFolder ? '#3b82f6' : 'inherit'}}>{l.isFolder ? <Lucide.Folder size={14} className="inline mr-1"/>: null}{l.name}</span>}
                   {!l.isFolder && (
                     <select value={l.blendMode || 'normal'} onChange={(e) => { e.stopPropagation(); const next = layers.map(layer => layer.id === l.id ? { ...layer, blendMode: e.target.value } : layer); setLayers(next); if (commitHistory) commitHistory(); }} title={t('blendMode')} className="ml-2 text-[10px] border border-gray-200 rounded px-1 py-0.5 bg-white">
                       <option value="normal">{t('blendNormal')}</option>
                       <option value="multiply">{t('blendMultiply')}</option>
                       <option value="screen">{t('blendScreen')}</option>
                       <option value="overlay">{t('blendOverlay')}</option>
                     </select>
                   )}
                 </div>
                 <div className="flex items-center space-x-1 opacity-60 shrink-0">
                    <button onClick={(e)=>togV(l.id, e)} title={t('showHide')}>{l.visible ? <Lucide.Eye size={14}/> : <Lucide.EyeOff size={14}/>}</button>
                    <button onClick={(e)=>togL(l.id, e)} title={t('lockUnlock')}>{l.locked ? <Lucide.Lock size={14} color="#ef4444"/> : <Lucide.Unlock size={14}/>}</button>
                    <button onClick={(e)=>togF(l.id, e)} title={t('normalFade')}>{l.faded ? <Lucide.Blend size={14} color="#3b82f6"/> : <Lucide.Blend size={14}/>}</button>
                    <button onClick={(e)=>mv(idx, -1, e)} disabled={idx===0} title={t('moveUp')} className="disabled:opacity-20"><Lucide.ChevronUp size={14}/></button>
                    <button onClick={(e)=>mv(idx, 1, e)} disabled={idx===parentLayers.length-1} title={t('moveDown')} className="disabled:opacity-20"><Lucide.ChevronDown size={14}/></button>
                    <button onClick={(e)=>del(l.id, e)} className="hover:text-red-500" title={l.isFolder ? t('deleteFolder') : t('deleteLayer')}><Lucide.Trash2 size={14}/></button>
                 </div>
              </div>
              {l.isFolder && l.expanded && childLayers.length > 0 && (
                <div className="ml-3 border-l border-blue-200 pl-1">
                  {renderLayers(childLayers)}
                </div>
              )}
            </div>
          );
        });
      };
      
      return (
        <>
          <div className="p-4 border-b border-gray-100"><div className="flex items-center text-xs font-bold text-gray-400 uppercase tracking-widest"><Lucide.Layers size={14} className="mr-2"/>{t('layersTitle')}</div></div>
          <div className="flex-1 overflow-y-auto p-3 space-y-1 text-sm">
            {renderLayers()}
            <div className="flex gap-2 mt-3">
              <button onClick={add} className="flex-1 py-1.5 border border-dashed border-gray-300 rounded-lg text-xs text-gray-500 hover:border-gray-900 hover:text-gray-900 transition-all">{t('addLayer')}</button>
              <button onClick={addFolder} className="flex-1 py-1.5 border border-dashed border-blue-300 rounded-lg text-xs text-blue-500 hover:border-blue-900 hover:text-blue-900 transition-all">{t('addFolder')}</button>
            </div>
          </div>
        </>
      );
    };
    
    const PropertiesPanel = ({ selectedIds = [], items, setItems, commitHistory, svgInputRef, customIcons, setCustomIcons, pixelsPerMm, t }) => {
      const it = selectedIds.length === 1 ? items.find(i => i.id === selectedIds[0]) : null;
      if (!it) return null;
      
      const upd = (k, v) => setItems(items.map(i => i.id === it.id ? { ...i, [k]: v } : i));
      const cUpd = () => { if (commitHistory) commitHistory(); };
      
      const updAndCommit = (k, v) => {
        setItems(prev => {
          const next = prev.map(i => i.id === it.id ? { ...i, [k]: v } : i);
          if (commitHistory) setTimeout(commitHistory, 0);
          return next;
        });
      };
      
      const btf = () => { setItems(p => [...p.filter(i => i.id !== it.id), it]); cUpd(); };
      const stb = () => { setItems(p => [it, ...p.filter(i => i.id !== it.id)]); cUpd(); };
      
      const divideLine = (n) => {
        const np = [...it.points];
        let totalL = 0; const segs = [];
        for(let i=0; i<np.length-1; i++){
           const d = Math.hypot(np[i+1].x-np[i].x, np[i+1].y-np[i].y);
           totalL += d; segs.push({d, p1:np[i], p2:np[i+1]});
        }
        let newPts = [];
        for(let i=0; i<=n; i++) {
          const target = (totalL / n) * i;
          let acc = 0;
          for(let j=0; j<segs.length; j++){
             if (acc + segs[j].d >= target - 0.05 || j === segs.length - 1) {
                const ratio = segs[j].d === 0 ? 0 : (target - acc) / segs[j].d;
                newPts.push({x: segs[j].p1.x + ratio*(segs[j].p2.x-segs[j].p1.x), y: segs[j].p1.y + ratio*(segs[j].p2.y-segs[j].p1.y)});
                break;
             }
             acc += segs[j].d;
          }
        }
        newPts[0] = np[0]; newPts[newPts.length-1] = np[np.length-1];
        updAndCommit('points', newPts);
      };

      const Sld = ({l, v, m, x, s=1, k, fmt=v=>v, tr=v=>v}) => <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400 flex justify-between">{l} <span>{fmt(v)}</span></label><input type="range" min={m} max={x} step={s} value={v} onChange={e=>upd(k, tr(parseFloat(e.target.value)))} onPointerUp={cUpd} onTouchEnd={cUpd} className="w-full accent-gray-700"/></div>;
      const Sel = ({l, v, k, opts, onChangeCustom}) => <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400">{l}</label><select value={v} onChange={onChangeCustom || (e=>updAndCommit(k, e.target.value))} className="w-full px-3 py-1.5 border border-gray-300 rounded-md text-sm">{opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select></div>;
      const Chk = ({l, v, k}) => <div className="flex items-center justify-between pt-2"><label className="text-sm text-gray-600 font-medium">{l}</label><input type="checkbox" checked={v} onChange={e=>updAndCommit(k, e.target.checked)} className="w-4 h-4 accent-gray-700"/></div>;

      const formatMeters = (px) => `${(px / pixelsPerMm / 1000).toFixed(2)} m`;
      const formatSquareMeters = (px2) => `${(px2 / (pixelsPerMm * pixelsPerMm) / 1000000).toFixed(2)} ㎡`;
      const computeObjectMetrics = (item) => {
        if (!item || !pixelsPerMm) return null;
        if (item.type === 'zone') {
          const areaPx = GeometryUtils.getZoneArea(item);
          const perimeterPx = GeometryUtils.getPolylineLength({ points: GeometryUtils.getZoneSubPaths(item)[0] });
          return {
            title: t('labelZone'),
            area: formatSquareMeters(areaPx),
            length: formatMeters(perimeterPx),
            showArea: true,
            showLength: true,
          };
        }
        const lineTypes = ['arrow', 'dashed_arrow', 'road', 'solid_line', 'dashed_line', 'spline'];
        if (lineTypes.includes(item.type)) {
          const lengthPx = GeometryUtils.getPolylineLength(item);
          return {
            title: t('labelArrow'),
            length: formatMeters(lengthPx),
          };
        }
        if (item.type === 'curve_arrow') {
          const lengthPx = Math.hypot((item.x2 || 0) - (item.x1 || 0), (item.y2 || 0) - (item.y1 || 0));
          return {
            title: t('labelArrow'),
            length: formatMeters(lengthPx),
          };
        }
        return null;
      };
      const metrics = computeObjectMetrics(it);

      return (
        <div className="border-t border-gray-200 bg-gray-50 p-4 space-y-4 animate-in fade-in slide-in-from-bottom-2">
          <div className="flex items-center justify-between font-bold text-sm border-b border-gray-200 pb-2"><div className="flex items-center"><Lucide.Settings2 size={16} className="mr-2"/>{t('objectSettings')}</div><div className="flex space-x-1"><button onClick={btf} className="p-1 hover:bg-gray-200 rounded" title={t('bringToFront')}><Lucide.ArrowUpToLine size={14}/></button><button onClick={stb} className="p-1 hover:bg-gray-200 rounded" title={t('sendToBack')}><Lucide.ArrowDownToLine size={14}/></button></div></div>
          {metrics && (
            <div className="bg-blue-50 border border-blue-200 rounded p-3 space-y-2 text-sm text-blue-900 mt-3">
              <div className="text-xs uppercase tracking-wide text-blue-700 font-semibold">{metrics.title}</div>
              {metrics.showLength && <div className="flex justify-between"><span>{t('objectLength')}</span><span className="font-semibold">{metrics.length}</span></div>}
              {metrics.showArea && <div className="flex justify-between"><span>{t('objectArea')}</span><span className="font-semibold">{metrics.area}</span></div>}
              {!metrics.showArea && metrics.length && <div className="flex justify-between"><span>{t('objectLength')}</span><span className="font-semibold">{metrics.length}</span></div>}
            </div>
          )}
          <div className="bg-white p-2 rounded-md border border-gray-200 shadow-sm mt-1 mb-2">
            <Chk l={t('lockPosition')} v={!!it.isLocked} k="isLocked"/>
            <Sel l={t('blendMode')} v={it.blendMode || 'normal'} k="blendMode" opts={[{v:'normal', l:t('blendNormal')},{v:'multiply', l:t('blendMultiply')},{v:'screen', l:t('blendScreen')},{v:'overlay', l:t('blendOverlay')}]} />
          </div>

          {it.type === 'legend' && <div className="max-h-64 overflow-y-auto pr-1 space-y-3"><div className="space-y-1"><label className="text-[10px] font-bold text-gray-400">{t('legendTitleLabel')}</label><input type="text" value={it.title||t('legendPlaceholder')} onChange={e=>upd('title',e.target.value)} onBlur={cUpd} className="w-full text-sm border border-gray-300 px-2 py-1 rounded outline-none focus:ring-1 focus:ring-gray-900"/></div>{it.entries?.map((ent,idx)=><div key={idx} className="space-y-1"><div className="flex items-center justify-between"><label className="text-[10px] font-bold text-gray-400 flex items-center"><div className="w-2 h-2 rounded-full mr-1.5" style={{backgroundColor:ent.color}}></div>{t('itemLabel')} {idx+1}</label><button type="button" onClick={() => { const ne = it.entries.filter((_, j) => j !== idx); upd('entries', ne); setTimeout(cUpd, 0); }} className="text-[10px] px-2 py-1 rounded bg-gray-100 hover:bg-gray-200">{t('delete')}</button></div><input type="text" value={ent.label} onChange={e=>{const ne=[...it.entries]; ne[idx]={...ent,label:e.target.value}; upd('entries',ne);}} onBlur={cUpd} className="w-full text-sm border border-gray-300 px-2 py-1 rounded outline-none focus:ring-1 focus:ring-gray-900"/></div>)}</div>}
          
          {it.type === 'icon_element' && (
            <div className="space-y-3">
              <Sel l={t('iconCategory')} v={it.iconCategory || 'human'} k="iconCategory" opts={[
                {v:'human', l:t('iconCategoryHuman')}, {v:'vehicle', l:t('iconCategoryVehicle')}, {v:'tree', l:t('iconCategoryTree')},
                {v:'compass', l:t('iconCategoryCompass')}, {v:'location_pin', l:t('iconCategoryLocationPin')}, {v:'scale_bar', l:t('iconCategoryScaleBar')},
                ...(Object.keys(customIcons).length > 0 ? [{v:'custom', l:t('iconCategoryCustom')}] : [])
              ]} onChangeCustom={(e) => {
                const cat = e.target.value;
                const defaultTypes = { 
                  human:'person_standing', vehicle:'car_front', tree:'tree_deciduous', 
                  compass:'compass_classic', location_pin:'pin_solid', scale_bar:'scale_4div',
                  custom: Object.keys(customIcons)[0] || 'custom_icon_1'
                };
                setItems(items.map(i => i.id === it.id ? { ...i, iconCategory: cat, iconType: defaultTypes[cat] } : i));
                setTimeout(cUpd, 0);
              }} />

              {it.iconCategory === 'human' && <div className="grid grid-cols-4 gap-2">{['person_standing', 'person_walking', 'woman_walking', 'couple', 'family', 'person_dog', 'outline_walking', 'outline_couple'].map(t => <button key={t} onClick={()=>updAndCommit('iconType', t)} className={`flex justify-center items-center py-2 border rounded-md ${it.iconType===t?'bg-gray-200 border-gray-800':'bg-white border-gray-200'}`}><svg width="24" height="24" viewBox="-15 -20 30 45">{RenderUtils.renderHumanIcon(t, it.iconType===t?'#1f2937':'#6b7280')}</svg></button>)}</div>}
              
              {it.iconCategory === 'vehicle' && <div className="grid grid-cols-4 gap-2">{['car_front', 'car_front_suv', 'car_side', 'suv', 'pickup', 'van', 'panel_van', 'truck', 'box_truck', 'truck_front', 'semi_truck', 'classic_semi_truck', 'bus', 'bus_front', 'double_decker', 'bike'].map(t => <button key={t} onClick={()=>updAndCommit('iconType', t)} className={`flex justify-center items-center py-2 border rounded-md ${it.iconType===t?'bg-gray-200 border-gray-800':'bg-white border-gray-200'}`}><svg width="24" height="24" viewBox="-15 -15 30 30">{RenderUtils.renderVehicleIcon(t, it.iconType===t?'#1f2937':'#6b7280')}</svg></button>)}</div>}

              {it.iconCategory === 'tree' && <div className="grid grid-cols-4 gap-2">{['tree_deciduous', 'tree_pine', 'tree_pine_layered', 'tree_pine_detailed', 'tree_oak', 'tree_palm', 'tree_bare', 'bush', 'tree_group', 'tree_outline_round', 'tree_outline_pine', 'tree_outline_layered', 'tree_outline_oak', 'tree_outline_bare', 'tree_outline_bush', 'tree_outline_group'].map(t => <button key={t} onClick={()=>updAndCommit('iconType', t)} className={`flex justify-center items-center py-2 border rounded-md ${it.iconType===t?'bg-gray-200 border-gray-800':'bg-white border-gray-200'}`}><svg width="24" height="24" viewBox="-15 -15 30 30">{RenderUtils.renderTreeIcon(t, it.iconType===t?'#1f2937':'#6b7280')}</svg></button>)}</div>}

              {it.iconCategory === 'compass' && <div className="grid grid-cols-3 gap-2">{['compass_classic', 'compass_minimal', 'compass_crosshair', 'compass_architectural', 'compass_solid_half', 'compass_solid_arrow'].map(t => <button key={t} onClick={()=>updAndCommit('iconType', t)} className={`flex justify-center items-center py-2 border rounded-md ${it.iconType===t?'bg-gray-200 border-gray-800':'bg-white border-gray-200'}`}><svg width="24" height="24" viewBox="-15 -15 30 30">{RenderUtils.renderCompassIcon(t, it.iconType===t?'#1f2937':'#6b7280')}</svg></button>)}</div>}

              {it.iconCategory === 'location_pin' && <div className="grid grid-cols-2 gap-2">{['pin_solid', 'pin_outline'].map(t => <button key={t} onClick={()=>updAndCommit('iconType', t)} className={`flex justify-center items-center py-2 border rounded-md ${it.iconType===t?'bg-gray-200 border-gray-800':'bg-white border-gray-200'}`}><svg width="24" height="24" viewBox="-15 -20 30 40">{RenderUtils.renderLocationPin(t, it.iconType===t?'#1f2937':'#6b7280')}</svg></button>)}</div>}

              {it.iconCategory === 'scale_bar' && <><div className="grid grid-cols-2 gap-2">{['scale_4div', 'scale_2div', 'scale_double', 'scale_line'].map(t => <button key={t} onClick={()=>updAndCommit('iconType', t)} className={`flex justify-center items-center py-2 px-1 border rounded-md ${it.iconType===t?'bg-gray-200 border-gray-800':'bg-white border-gray-200'}`}><svg width="100%" height="24" viewBox="-55 -10 110 20">{RenderUtils.renderScaleBar(t, it.iconType===t?'#1f2937':'#6b7280', '')}</svg></button>)}</div><div className="space-y-1"><label className="text-[10px] font-bold text-gray-400">{t('scaleBarTextLabel')}</label><input type="text" value={it.text||''} onChange={e=>upd('text',e.target.value)} onBlur={cUpd} className="w-full text-sm border border-gray-300 px-2 py-1 rounded outline-none focus:ring-1 focus:ring-gray-900"/></div></>}

              {it.iconCategory === 'custom' && (
                <div className="space-y-2">
                  <div className="space-y-1">
                    <label className="text-[10px] font-bold text-gray-400">{t('selectCustomIcon')}</label>
                    <select value={it.iconType || Object.keys(customIcons)[0] || ''} onChange={e=>updAndCommit('iconType', e.target.value)} className="w-full px-3 py-1.5 border border-gray-300 rounded-md text-sm">
                      {Object.keys(customIcons).map(key => <option key={key} value={key}>{key}</option>)}
                    </select>
                  </div>
                  <div className="grid grid-cols-3 gap-2">
                    {Object.keys(customIcons).map(key => (
                      <button key={key} onClick={()=>updAndCommit('iconType', key)} title={key} className={`flex flex-col items-center justify-center py-2 px-1 border rounded-md text-[10px] truncate ${it.iconType===key?'bg-gray-200 border-gray-800':'bg-white border-gray-200'}`}>
                        <div className="w-full h-12 flex items-center justify-center mb-1 bg-gray-50 rounded border border-gray-100" dangerouslySetInnerHTML={{__html: customIcons[key]}} style={{color: it.color, maxWidth: '40px', maxHeight: '40px'}} />
                        <span className="text-[8px] text-gray-600 text-center truncate w-full">{key}</span>
                      </button>
                    ))}
                  </div>
                  <div className="flex gap-1">
                    <button onClick={() => svgInputRef?.current?.click?.()} className="flex-1 px-2 py-1.5 text-[10px] font-semibold bg-blue-100 text-blue-700 hover:bg-blue-200 rounded border border-blue-300 flex items-center justify-center gap-1">
                      <Lucide.Upload size={12}/> {t('upload')}
                    </button>
                    {it.iconType && customIcons[it.iconType] && (
                      <button onClick={() => {
                        const newIcons = {...customIcons};
                        delete newIcons[it.iconType];
                        setCustomIcons(newIcons);
                        safeSetLocalStorage('customIcons', JSON.stringify(newIcons));
                        updAndCommit('iconType', Object.keys(newIcons)[0] || 'custom_icon_1');
                      }} className="flex-1 px-2 py-1.5 text-[10px] font-semibold bg-red-100 text-red-700 hover:bg-red-200 rounded border border-red-300 flex items-center justify-center gap-1">
                        <Lucide.Trash2 size={12}/> {t('delete')}
                      </button>
                    )}
                  </div>
                </div>
              )}

              <Sld l={it.iconCategory === 'scale_bar' ? t('scaleSizeWidth') : t('scaleSize')} v={it.scale||1.5} m="0.5" x="10" s="0.1" k="scale" fmt={v=>`${v}x`}/>
              {it.type === 'icon_element' && it.iconCategory !== 'compass' && <Sld l={t('rotationAngle')} v={it.rotation||0} m="-180" x="180" s="1" k="rotation" fmt={v=>`${v}°`}/>}
              {['compass', 'triangle_marker'].includes(it.iconCategory) && <Sld l={t('rotationAngle')} v={it.rotation||0} m="-180" x="180" s="1" k="rotation" fmt={v=>`${v}°`}/>}
            </div>
          )}
          
          {it.type === 'highlight' && <Sel l={t('style')} v={it.iconType||'outline'} k="iconType" opts={[{v:'outline',l:`${t('lineSolid')} (${t('outline')})`},{v:'solid',l:`${t('fillSolid')} (${t('solid')})`}]} />}
          {it.type === 'radiating_circle' && (
            <Sel l="波紋樣式" v={it.iconType||'gradient'} k="iconType" opts={[{v:'gradient',l:'漸層'},{v:'thick_rings',l:'粗環'},{v:'thin_rings',l:'細環'},{v:'dotted_rings',l:'點陣環'}]} />
          )}
          {['highlight', 'radiating_circle', 'circle_zone'].includes(it.type) && <Sld l="半徑 (Radius)" v={it.r||50} m="5" x="1000" k="r" fmt={v=>`${Math.round(v)}px`}/>}
          
          {['triangle_marker'].includes(it.type) && <Sld l="旋轉角度" v={it.rotation||0} m="-180" x="180" s="1" k="rotation" fmt={v=>`${v}°`}/>}

          {it.type === 'guide' && <Sel l={t('direction')} v={it.axis||'h'} k="axis" opts={[{v:'h',l:t('horizontal')},{v:'v',l:t('vertical')}]}/>}
          {it.type === 'leader_text' && <><div className="space-y-1"><label className="text-[10px] font-bold text-gray-400">{t('titleTop')}</label><input type="text" value={it.textTop||''} onChange={e=>upd('textTop',e.target.value)} onBlur={cUpd} className="w-full text-sm border border-gray-300 px-2 py-1 rounded outline-none focus:ring-1 focus:ring-gray-900"/></div><div className="space-y-1"><label className="text-[10px] font-bold text-gray-400">{t('titleBottom')}</label><textarea value={it.textBottom||''} onChange={e=>upd('textBottom',e.target.value)} onBlur={cUpd} className="w-full text-sm border border-gray-300 px-2 py-1 rounded outline-none focus:ring-1 focus:ring-gray-900" rows="2"></textarea></div></>}
          
          {it.type === 'text' && <><div className="space-y-1"><label className="text-[10px] font-bold text-gray-400">{t('textContent')}</label><textarea value={it.text||''} onChange={e=>updAndCommit('text',e.target.value)} rows="3" className="w-full text-sm border border-gray-300 px-2 py-1 rounded outline-none focus:ring-1 focus:ring-gray-900 resize-y"></textarea></div><Sld l={t('fontSize')} v={it.fontSize||16} m="10" x="60" k="fontSize" fmt={v=>`${v}px`}/><Chk l={t('showBackgroundBox')} v={it.showBg!==false} k="showBg"/></>}
          {it.type === 'image' && <><div className="space-y-1"><label className="text-[10px] font-bold text-gray-400">{t('width')}</label><input type="number" value={it.width||0} onChange={e=>upd('width', parseInt(e.target.value) || 0)} onBlur={cUpd} className="w-full text-sm border border-gray-300 px-2 py-1 rounded outline-none focus:ring-1 focus:ring-gray-900"/></div><div className="space-y-1"><label className="text-[10px] font-bold text-gray-400">{t('height')}</label><input type="number" value={it.height||0} onChange={e=>upd('height', parseInt(e.target.value) || 0)} onBlur={cUpd} className="w-full text-sm border border-gray-300 px-2 py-1 rounded outline-none focus:ring-1 focus:ring-gray-900"/></div></>}
          {(it.points || /arrow/.test(it.type) || it.type==='zone' || it.type==='spline' || it.type==='circle_zone' || (it.type==='highlight' && it.iconType!=='solid')) && <Sld l="線條粗細" v={it.strokeWidth??(it.type==='highlight'?6:4)} m="0" x="20" k="strokeWidth" fmt={v=>`${v}px`}/>}
          {it.points && <div className="space-y-1"><label className="text-[10px] font-bold text-gray-400">{t('segmentDivide')}</label><div className="flex space-x-2">{[2,3,4,5].map(n=><button key={n} onClick={()=>divideLine(n)} className="flex-1 py-1.5 text-xs font-semibold text-gray-600 border border-gray-300 rounded bg-white hover:bg-gray-100">{n} {t('divide')}</button>)}</div></div>}
          {/arrow|spline/.test(it.type) && <Sld l={t('arrowSize')} v={it.arrowSize??1} m="0.5" x="3" s="0.1" k="arrowSize" fmt={v=>`${v}x`}/>}
          {/arrow|zone|road|spline/.test(it.type) && <Sld l={t('cornerRadius')} v={it.cornerRadius??0} m="0" x="100" k="cornerRadius" fmt={v=>`${v}px`}/>}
