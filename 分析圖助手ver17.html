            <input type="file" ref={svgInputRef} onChange={handleSVGUpload} accept=".svg,image/svg+xml" className="hidden" />
            <input type="file" ref={imageItemInputRef} onChange={handleImageItemUpload} accept="image/*" className="hidden" />
            {isTabletSidePanel ? (
              <div className="absolute right-0 top-0 bottom-0 z-20 w-72 bg-white border-l border-gray-200 shadow-xl overflow-y-auto">
                {topbarStage < 2 && <Topbar snapEnabled={snapEnabled} setSnapEnabled={setSnapEnabled} isSketchMode={isSketchMode} setIsSketchMode={setIsSketchMode} gridType={gridType} setGridType={setGridType} canUndo={canUndo} canRedo={canRedo} undo={undo} redo={redo} snapshots={snapshots} saveSnapshot={saveSnapshot} loadSnapshot={loadSnapshot} handleMergeLines={handleMergeLines} handleZoneBoolean={handleZoneBoolean} handleSmartFill={handleSmartFill} handleFillClosedArea={handleFillClosedArea} generateLegend={generateLegend} exportSVG={exportSVG} exportPNG={exportPNG} exportDXF={exportDXF} exportPDF={exportPDF} selectedIds={selectedIds} setItems={setItems} commitHistory={commitHistory} canMergeLines={canMergeLines} canMergeZones={canMergeZones} onImportBg={() => fileInputRef.current.click()} onImportImageItem={() => imageItemInputRef.current?.click()} clearBackground={clearBackground} bgImage={bgImage} zoom={zoom} setZoom={setZoom} setPan={setPan} canGroup={canGroup} canUngroup={canUngroup} handleGroup={handleGroup} handleUngroup={handleUngroup} handleAlign={handleAlign} canDistribute={canDistribute} handleDistribute={handleDistribute} handleMirror={handleMirror} svgInputRef={svgInputRef} saveCustomIconLibrary={saveCustomIconLibrary} importCustomIconLibrary={importCustomIconLibrary} customIcons={customIcons} setActiveTool={setActiveTool} showRightPanel={showRightPanel} setShowRightPanel={setShowRightPanel} showToolbar={showToolbar} toggleToolbar={toggleToolbar} topbarStage={topbarStage} t={t} locale={locale} setLocale={setLocale} onNewFile={openNewFile} />}
              </div>
            ) : (
              topbarStage < 2 && <Topbar snapEnabled={snapEnabled} setSnapEnabled={setSnapEnabled} isSketchMode={isSketchMode} setIsSketchMode={setIsSketchMode} gridType={gridType} setGridType={setGridType} canUndo={canUndo} canRedo={canRedo} undo={undo} redo={redo} snapshots={snapshots} saveSnapshot={saveSnapshot} loadSnapshot={loadSnapshot} handleMergeLines={handleMergeLines} handleZoneBoolean={handleZoneBoolean} handleSmartFill={handleSmartFill} handleFillClosedArea={handleFillClosedArea} generateLegend={generateLegend} exportSVG={exportSVG} exportPNG={exportPNG} exportDXF={exportDXF} exportPDF={exportPDF} selectedIds={selectedIds} setItems={setItems} commitHistory={commitHistory} canMergeLines={canMergeLines} canMergeZones={canMergeZones} onImportBg={() => fileInputRef.current.click()} onImportImageItem={() => imageItemInputRef.current?.click()} clearBackground={clearBackground} bgImage={bgImage} zoom={zoom} setZoom={setZoom} setPan={setPan} canGroup={canGroup} canUngroup={canUngroup} handleGroup={handleGroup} handleUngroup={handleUngroup} handleAlign={handleAlign} canDistribute={canDistribute} handleDistribute={handleDistribute} handleMirror={handleMirror} svgInputRef={svgInputRef} saveCustomIconLibrary={saveCustomIconLibrary} importCustomIconLibrary={importCustomIconLibrary} customIcons={customIcons} setActiveTool={setActiveTool} showRightPanel={showRightPanel} setShowRightPanel={setShowRightPanel} showToolbar={showToolbar} toggleToolbar={toggleToolbar} topbarStage={topbarStage} t={t} locale={locale} setLocale={setLocale} onNewFile={openNewFile} />
            )}
            <Canvas items={items} setItems={setItems} selectedIds={selectedIds} setSelectedIds={setSelectedIds} activeTool={activeTool} setActiveTool={setActiveTool} activeColor={activeColor} setActiveColor={handleColorChange} snapEnabled={snapEnabled} gridType={gridType} isSketchMode={isSketchMode} layers={layers} activeLayerId={activeLayerId} bgImage={bgImage} commitHistory={commitHistory} pan={pan} setPan={setPan} zoom={zoom} setZoom={setZoom} canGroup={canGroup} canUngroup={canUngroup} handleGroup={handleGroup} handleUngroup={handleUngroup} handleAlign={handleAlign} handleDistribute={handleDistribute} handleMergeLines={handleMergeLines} handleZoneBoolean={handleZoneBoolean} measurePoints={measurePoints} setMeasurePoints={setMeasurePoints} measureResults={measureResults} setMeasureResults={setMeasureResults} pixelsPerMm={pixelsPerMm} customIcons={customIcons} t={t} />

            <div className="absolute top-20 right-4 z-40 pointer-events-auto">

                  <Lucide.Undo2 size={16} /> {t('undo')}
                </button>
                <button type="button" onClick={redo} disabled={!canRedo} className={`flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-semibold transition ${!canRedo ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-white text-gray-800 hover:bg-gray-50'}`} title={t('redo')}>
                  <Lucide.Redo2 size={16} /> {t('redo')}
                </button>
              </div>
            </div>

            <div className="absolute bottom-4 right-4 z-40 pointer-events-none">
              {scaleLabel && (
                <div className="bg-white/95 px-3 py-2 rounded-2xl border border-gray-200 shadow-lg text-[12px] font-semibold text-gray-800">
                  {t('currentScale')}: {scaleLabel}
                </div>
              )}
            </div>
            <div className="absolute bottom-4 left-4 z-40 flex space-x-3 pointer-events-none">
              <HelpMenu t={t} />
              <SOPMenu t={t} />
              <button type="button" onClick={advanceTopbarStage} className={`w-8 h-8 bg-white border border-gray-200 rounded-full shadow-md flex items-center justify-center transition-all pointer-events-auto ${topbarStage < 2 ? 'text-gray-700 hover:text-gray-900' : 'text-gray-400 hover:text-gray-600'}`} title={topbarStage === 0 ? '隱藏上方選單（先隱藏第二欄）' : topbarStage === 1 ? '隱藏上方選單（再隱藏第一欄）' : '顯示上方選單'}>
                {topbarStage === 2 ? <Lucide.ChevronDown size={16}/> : <Lucide.ChevronUp size={16}/>}
              </button>
            </div>
            <div className="absolute bottom-3 right-3 z-40 text-[11px] text-gray-400 pointer-events-none">Developed by Wu Chieh Chun</div>
          </div>
          <div className={`bg-white border-l border-gray-200 flex flex-col z-20 shrink-0 shadow-sm transition-all duration-300 overflow-hidden ${showRightPanel ? 'w-64' : 'w-0'}`}>
            <LayerPanel layers={layers} setLayers={setLayers} activeLayerId={activeLayerId} setActiveLayerId={setActiveLayerId} setItems={setItems} commitHistory={commitHistory} t={t} />
            {activeTool === 'icon_library' ? (
              <div className="flex-1 overflow-y-auto p-4 space-y-4">
                <div className="font-bold text-sm border-b border-gray-200 pb-2 flex items-center justify-between">
                  <div className="flex items-center"><Lucide.Palette size={16} className="mr-2"/>自定義ICON庫</div>
                  <button onClick={() => setActiveTool('select')} className="text-gray-400 hover:text-gray-600" title="關閉"><Lucide.X size={14}/></button>
                </div>
                {Object.keys(customIcons).length === 0 ? (
                  <div className="text-center py-8 space-y-4 flex flex-col items-center">
                    <Lucide.AlertCircle size={32} className="text-gray-300"/>
                    <div>
                      <p className="text-sm text-gray-500">還沒有自定義ICON</p>
                      <p className="text-xs text-gray-400 mt-2">上傳SVG文件來創建</p>
                    </div>
                    <button onClick={() => svgInputRef?.current?.click?.()} className="w-full px-4 py-2.5 text-sm font-semibold bg-blue-500 text-white hover:bg-blue-600 rounded-lg flex items-center justify-center gap-2 transition-colors shadow-md">
                      <Lucide.Upload size={16}/> 開始上傳
                    </button>
                  </div>
                ) : (
                  <div className="space-y-3">
                    <div className="bg-blue-50 border border-blue-200 rounded p-2 text-[10px] text-blue-700 font-semibold">
                      ✓ 已存儲 {Object.keys(customIcons).length} 個自定義圖示
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      {Object.entries(customIcons).map(([name, content]) => (
                        <div key={name} className="bg-white border border-gray-200 rounded-lg p-3 hover:shadow-md transition-shadow">
                          <div className="flex items-center justify-center h-20 bg-gray-50 rounded mb-2 border border-gray-100">
                            <div className="w-12 h-12 flex items-center justify-center" dangerouslySetInnerHTML={{__html: content}} style={{color: '#1f2937'}} />
                          </div>
                          <p className="text-[10px] font-semibold text-gray-700 truncate text-center" title={name}>{name}</p>
                          <div className="flex gap-1 mt-2">
                            <button onClick={() => {setItems(prev => [...prev, {id: `icon-${Date.now()}`, type: 'icon_element', x: 100, y: 100, iconCategory: 'custom', iconType: name, color: activeColor, scale: 1.5}]); commitHistory();}} className="flex-1 text-[9px] px-1 py-1 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded font-semibold">
                              加入
                            </button>
                            <button onClick={() => {const newIcons = {...customIcons}; delete newIcons[name]; setCustomIcons(newIcons); safeSetLocalStorage('customIcons', JSON.stringify(newIcons));}} className="flex-1 text-[9px] px-1 py-1 bg-red-100 text-red-700 hover:bg-red-200 rounded font-semibold">
                              刪除
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                    <div className="flex gap-2 pt-2 border-t border-gray-200">
                      <button onClick={() => svgInputRef?.current?.click?.()} className="flex-1 px-3 py-1.5 text-xs font-semibold bg-blue-500 text-white hover:bg-blue-600 rounded flex items-center justify-center gap-1">
                        <Lucide.Upload size={12}/> 上傳更多
                      </button>
                      <button onClick={saveCustomIconLibrary} className="flex-1 px-3 py-1.5 text-xs font-semibold bg-green-500 text-white hover:bg-green-600 rounded flex items-center justify-center gap-1">
                        <Lucide.Download size={12}/> 備份
                      </button>
                    </div>
                  </div>
                )}
              </div>
            ) : activeTool === 'measure' ? (
              <div className="flex-1 overflow-y-auto p-4 space-y-4">
                <div className="font-bold text-sm border-b border-gray-200 pb-2 flex items-center"><Lucide.Ruler size={16} className="mr-2"/>測量工具設定</div>
                <div className="space-y-3">
                  <div className="space-y-1">
                    <label className="text-[10px] font-bold text-gray-400">{t('meterScaleLabel')}</label>
                    <input type="number" value={(pixelsPerMm * 1000).toFixed(0)} onChange={e=>setPixelsPerMm((parseFloat(e.target.value)||1) / 1000)} step="1" min="1" className="w-full px-3 py-1.5 border border-gray-300 rounded-md text-sm" />
                    <p className="text-[9px] text-gray-500">{t('scaleHint')}</p>
                  </div>
                  <div className="space-y-1">
                    <label className="text-[10px] font-bold text-gray-400">像素/毫米比例</label>
                    <input type="number" value={pixelsPerMm} onChange={e=>setPixelsPerMm(parseFloat(e.target.value)||3.78)} step="0.1" min="0.1" className="w-full px-3 py-1.5 border border-gray-300 rounded-md text-sm" />
                    <p className="text-[9px] text-gray-500">標準96 DPI = 3.78 px/mm</p>
                  </div>
                  <div className="space-y-1">
                    <label className="text-[10px] font-bold text-gray-400">{t('setScaleFromMeasure')}</label>
                    <div className="grid grid-cols-[1fr_auto] gap-2">
                      <input type="number" value={scaleReferenceMm} onChange={e=>setScaleReferenceMm(e.target.value)} step="1" min="1" className="w-full px-3 py-1.5 border border-gray-300 rounded-md text-sm" placeholder="1000" />
                      <button type="button" onClick={() => {
                        const targetMm = parseFloat(scaleReferenceMm);
                        if (!targetMm || measureResults.length === 0) return;
                        const last = measureResults[measureResults.length - 1];
                        const pixelDistance = Math.hypot(last.p2.x - last.p1.x, last.p2.y - last.p1.y);
                        if (!pixelDistance) return;
                        const newPixelsPerMm = pixelDistance / targetMm;
                        const oldMeasuredMm = pixelDistance / pixelsPerMm;
                        setPixelsPerMm(newPixelsPerMm);
                        const ratio = oldMeasuredMm > 0 ? Math.max(1, Math.round(targetMm / oldMeasuredMm)) : 1;
                        setScaleLabel(`1:${ratio}`);
                        setMeasureResults(prev => prev.map(r => ({
                          ...r,
                          distance: (Math.hypot(r.p2.x - r.p1.x, r.p2.y - r.p1.y) / newPixelsPerMm).toFixed(2)
                        })));
                      }} className="px-3 py-1.5 bg-blue-600 text-white rounded-md text-sm font-semibold hover:bg-blue-700 disabled:bg-gray-200 disabled:text-gray-400" disabled={measureResults.length === 0 || !parseFloat(scaleReferenceMm)}>{t('applyScale')}</button>
                    </div>
                    {measureResults.length > 0 && <p className="text-[9px] text-gray-500">{t('actualDistance')}：{scaleReferenceMm} mm</p>}
                  </div>
                  <button onClick={() => {setMeasureResults([]); setMeasurePoints([]);}} className="w-full py-2 px-3 bg-red-500 text-white rounded text-sm font-semibold hover:bg-red-600">清除測量結果</button>
                  {measureResults.length > 0 && (
                    <div className="bg-gray-50 p-3 rounded border border-gray-200">
                      <p className="text-[10px] font-bold text-gray-600 mb-2">測量結果 ({measureResults.length})</p>
                      <div className="space-y-1 max-h-48 overflow-y-auto">
                        {measureResults.map((r, i) => {
                          const distance = (Math.hypot(r.p2.x - r.p1.x, r.p2.y - r.p1.y) / pixelsPerMm).toFixed(2);
                          return (
                            <div key={i} className="text-[11px] text-gray-700 flex justify-between items-center">
                              <span>測量 {i+1}</span>
                              <span className="font-semibold text-blue-600">{distance} mm</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            ) : (
              <PropertiesPanel selectedIds={selectedIds} items={items} setItems={setItems} commitHistory={commitHistory} svgInputRef={svgInputRef} customIcons={customIcons} setCustomIcons={setCustomIcons} pixelsPerMm={pixelsPerMm} t={t} />
            )}
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<DiagramAssistant />);

    if (location.protocol.startsWith('http') && 'serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').then(reg => {
          console.log('Service Worker registered:', reg.scope);
        }).catch(err => {
          console.warn('Service Worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
